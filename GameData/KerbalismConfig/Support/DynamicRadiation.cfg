// ============================================================================
// DynamicRadiation.cfg
// KerbalismBridge integration support merged into KerbalismConfig.
// ============================================================================


// ============================================================================
// KerbalismBridge integration: Settings.cfg
// ============================================================================
KERBALISM_DYNAMIC_RADIATION_SETTINGS
{
	// Minimum radiation while idle, as percent of peak (MM / Kerbalism Emitter config).
	Reactor_MinEmissionPercent = 25
	// E-folding time (seconds) for decay after shutdown (loaded / unloaded).
	Reactor_EmissionDecayRate = 3600

	Engine_MinEmissionPercent = 25
	Engine_EmissionDecayRate = 360
}


// ============================================================================
// ProcessController fission reactors (USI / Buffalo / FTT without SH; NFE uses ProcessControllerSystemHeat below)
// ============================================================================
@PART[*]:HAS[@MODULE[Emitter]:HAS[#radiation[>0]],@MODULE[ProcessController]:HAS[#resource[_Nukereactor]],!MODULE[DynamicRadiationController]]:NEEDS[Kerbalism,FeatureRadiation]:LAST[KerbalismBridge30Radiation]
{
	MODULE
	{
		name = DynamicRadiationController
		powerModuleName = ProcessController
		powerModuleId = _Nukereactor
		powerActiveMode = running
		minEmissionPercent = #$@KERBALISM_DYNAMIC_RADIATION_SETTINGS/Reactor_MinEmissionPercent$
		emissionDecayRate = #$@KERBALISM_DYNAMIC_RADIATION_SETTINGS/Reactor_EmissionDecayRate$
	}
}

// Fission reactors on ProcessControllerSystemHeat (NFE and SH-bridged packs)
@PART[*]:HAS[@MODULE[Emitter]:HAS[#radiation[>0]],@MODULE[ProcessControllerSystemHeat]:HAS[#resource[_Nukereactor]],!MODULE[DynamicRadiationController]]:NEEDS[Kerbalism,FeatureRadiation]:LAST[KerbalismBridge30Radiation]
{
	MODULE
	{
		name = DynamicRadiationController
		powerModuleName = ProcessControllerSystemHeat
		powerModuleId = _Nukereactor
		powerActiveMode = running
		minEmissionPercent = #$@KERBALISM_DYNAMIC_RADIATION_SETTINGS/Reactor_MinEmissionPercent$
		emissionDecayRate = #$@KERBALISM_DYNAMIC_RADIATION_SETTINGS/Reactor_EmissionDecayRate$
	}
}
