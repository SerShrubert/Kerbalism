// ============================================================================
// Interkosmos - Kerbalism science support
// https://github.com/Kerbalism/Kerbalism/issues/432
// https://github.com/AstroWell/Interkosmos
//
// Convert Interkosmos ModuleScienceExperiment instruments to Kerbalism Experiment.
// Science values match Interkosmos ScienceDefs. No private HardDrive — data uses
// vessel probe/command storage (same as SolarScience sensors).
// ============================================================================

@KERBALISM_EXPERIMENT_VALUES:NEEDS[Interkosmos,FeatureScience]
{
	Interkosmos
	{
		// Gas composition sensor — mid-tier atmospheric/surface instrument
		GasAnalyzer
		{
			ECCost = 0.06
			size = 5
			value = 12
			duration = 720								// 12 min
			requirements =
			ResourceRates =
		}

		// Humidity / water-content sensor
		Hydrometer
		{
			ECCost = 0.03
			size = 2.5
			value = 8
			duration = 360								// 6 min
			requirements =
			ResourceRates =
		}

		// Thermal IR spectrometer
		IRSpectrometer
		{
			ECCost = 0.05
			size = 4.5
			value = 10
			duration = 600								// 10 min
			requirements =
			ResourceRates =
		}

		// Multi-band photometer (single experiment; filter wheel not split)
		Photometer
		{
			ECCost = 0.04
			size = 4
			value = 10
			duration = 480								// 8 min
			requirements =
			ResourceRates =
		}

		// Polarization / cloud reflectivity instrument
		Photopolarimeter
		{
			ECCost = 0.04
			size = 3.5
			value = 9
			duration = 480								// 8 min
			requirements =
			ResourceRates =
		}

		// Crystal growth experiment (converter / Crystal resource left alone)
		Crystals
		{
			ECCost = 0.05
			size = 3
			value = 8
			duration = 900								// 15 min
			requirements =
			ResourceRates =
		}
	}
}

// ============================================================================
// Replace stock experiment modules
// ============================================================================

@PART[*]:HAS[@MODULE:HAS[#experimentID[GasAnalyzer]]]:NEEDS[Interkosmos,FeatureScience]
{
	!MODULE:HAS[#experimentID[GasAnalyzer]] {}
	!MODULE[ModuleAnimateGeneric] {}

	MODULE
	{
		name = Experiment
		experiment_id = GasAnalyzer
		anim_deploy = Animation
		allow_shrouded = False
	}
}

@PART[*]:HAS[@MODULE:HAS[#experimentID[Hydrometer]]]:NEEDS[Interkosmos,FeatureScience]
{
	!MODULE:HAS[#experimentID[Hydrometer]] {}

	MODULE
	{
		name = Experiment
		experiment_id = Hydrometer
	}
}

