// ============================================================================
// KPBS Layer A hygiene (not dependent on the optional SystemHeat Extras)
// ============================================================================
@PART[KKAOSS_Nuclear_Reactor]:NEEDS[PlanetaryBaseInc,Kerbalism,ProfileDefault]:LAST[KerbalismBridge00Integration]
{
	!MODULE[SystemHeatFissionReactorKerbalismUpdater],* {}
}

@PART[KKAOSS_Centrifuge]:NEEDS[PlanetaryBaseInc,Kerbalism,ProfileDefault]:LAST[KerbalismBridge00Integration]
{
	!MODULE[ModuleSystemHeatConverter],* {}
	!MODULE[SystemHeatConverterKerbalismUpdater],* {}
}

// ============================================================================
// Comfort: plants (KPBS greenhouses — Greenhouse module alone does not grant plants comfort)
// ============================================================================

@PART[KKAOSS_Greenhouse_g|KKAOSS_LS_container_greenhouse]:NEEDS[PlanetaryBaseInc,FeatureComfort]:AFTER[KerbalismDefault]
{
	MODULE:NEEDS[FeatureComfort]
	{
		name = Comfort
		bonus = plants
		desc = #KERBALISM_Comfort_plants_desc
	}

	@tags ^= :$: comfort:
}
