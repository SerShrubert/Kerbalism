@PART[bluedog_OFO_Experiment]:HAS[@MODULE[*ModuleScience*]:HAS[#experimentID[bd_bioexp]]]:NEEDS[Bluedog_DB,FeatureScience]:FOR[zzzKerbalismDefault]
{
    MODULE
    {
      name = Experiment
      experiment_id = bd_FOEP
      data_rate = #$@KERBALISM_EXPERIMENT_VALUES/BDB/bd_FOEP/size$
      @data_rate /= #$@KERBALISM_EXPERIMENT_VALUES/BDB/bd_FOEP/duration$
      ec_rate = #$@KERBALISM_EXPERIMENT_VALUES/BDB/bd_FOEP/ec_rate$
      sample_amount = 3
    }

    // Buff batteries to allow experiment to complete without power generation
    RESOURCE[ElectricCharge]
    {
      amount = 200
    }

    // Small RTG to let this experiment run its full length without power generation
    MODULE
    {
        name = ProcessController
        resource = _RTG
        title = RTG
        capacity = 0.03
        running = true
    }
}

