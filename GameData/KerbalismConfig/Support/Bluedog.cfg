// ============================================================================
// Fuel cells for Gemini and Apollo service modules
// ============================================================================
@PART[bluedog_Gemini_EquipmentModule,bluedog_Gemini_ArrowSM]:NEEDS[Bluedog_DB,ProfileDefault]:FOR[zzzKerbalismDefault]
{
  fuelcell_capacity = 0.25
  fuelcell_duration = 7.5 // Duration in real days. No system scaling adjustments yet
}

@PART[bluedog_MOL_EquipmentSection]:NEEDS[Bluedog_DB,ProfileDefault]:FOR[zzzKerbalismDefault]
{
  fuelcell_capacity = 0.5
  fuelcell_duration = 15
}

@PART[bluedog_Apollo_Block2_SM,bluedog_BigG_ConicSM_CargoModule,bluedog_BigG_CylindricalSM_CargoModule,bluedog_Gemini_LunarReconSM]:NEEDS[Bluedog_DB,ProfileDefault]:FOR[zzzKerbalismDefault]
{
  fuelcell_capacity = 0.5
  fuelcell_duration = 7.5
}

@PART[bluedog_Gemini_EquipmentModule,bluedog_Apollo_Block2_SM,bluedog_BigG_ConicSM_CargoModule,bluedog_BigG_CylindricalSM_CargoModule,bluedog_Gemini_ArrowSM,bluedog_Gemini_LunarReconSM,bluedog_MOL_EquipmentSection]:NEEDS[Bluedog_DB,ProfileDefault]:FOR[zzzKerbalismDefault]
{
  !MODULE[ModuleResourceConverter] {}
  !MODULE[ModuleB9PartSwitch]:HAS[#moduleID[fuelCellSwitch]] {}

  MODULE
  {
    name = ProcessController
    resource = _FuelCell
    title = #KERBALISM_H2O2FuelCell_title
    capacity = 1 //2.4 ec/sec
    @capacity *= #$../fuelcell_capacity$
    valve_i = 1
  }

  MODULE
  {
    name = Configure
    title = Equipment Module
    configureId = EquipmentModule
    slots = 1

    SETUP
    {
      name = None
      desc = #KERBALISM_None_desc
    }
    SETUP
    {
      name = Batteries
      desc = Extra battery storage for extended missions.
      mass = 0.01
      cost = 300
      tech = simpleCommandModules

      RESOURCE
      {
        name = ElectricCharge
        amount = 3000
        maxAmount = 3000
      }
    }
    SETUP
    {
      name = Hydrogen Oxygen Fuel Cell
      desc = #KERBALISM_H2O2FuelCell_desc
      mass = 0.1
      @mass *= #$../../fuelcell_capacity$
      cost = 2250
      @cost *= #$../../fuelcell_capacity$
      tech = simpleCommandModules

      MODULE
      {
        type = ProcessController
        id_field = resource
        id_value = _FuelCell
      }

      RESOURCE
      {
        name = Oxygen
        amount = 47520 // 24hrs + 10%
        @amount *= #$../../../fuelcell_capacity$
        @amount *= #$../../../fuelcell_duration$
        maxAmount = #$amount$
      }
      RESOURCE
      {
        name = Hydrogen
        amount = 86400 //24hrs
        @amount *= #$../../../fuelcell_capacity$
        @amount *= #$../../../fuelcell_duration$
        maxAmount = #$amount$
      }
    }

  }
}

