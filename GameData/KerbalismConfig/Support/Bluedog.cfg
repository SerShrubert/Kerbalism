// ============================================================================
// Science configs
// by SerShrubert aka TheShrubbery
// reviewed by 
// ============================================================================

@KERBALISM_EXPERIMENT_VALUES:NEEDS[Bluedog_DB,FeatureScience]
{
  %BDB
  {
    bd_mapping // CORONA
    {
      value = 3
      size = 1      
      duration = 60
      ec_rate = 0.05
    }
    bd_Photometer // Early probes
    {
      value = 3
      size = 0.5      
      duration = 300
      ec_rate = 0.05
    }
    bd_weather // Nimbus
    {
      value = 5
      duration = 216000 // 60 hours
      size = 2000
      ec_rate = 0.05
    }
    bd_microwaveSpec // Nimbus, Mariner, Apollo, Skylab, OV1
    {
      value = 6
      duration = 43200 // 12 hours
      size = 200
      ec_rate = 0.1
    }
    bd_IRradiometer // Nimbus, voyager Mars Orbiter, Mariner, Viking, Pioneer, OV1
    {
      value = 2 // Very similar to bd_IRspec but required for contract. Give it a low value
      size = 36      
      duration = 3600 // 1 hours
      ec_rate = 0.2
    }
    bd_ionElec // Ranger, Explorer, Mariner, OGO, Injun, LOFTI
    {
      value = 4
      duration = 18000 // 5 hours
      size = 35
      ec_rate = 0.05
    }
    bd_UVspec // Ranger, Mariner, etc
    {
      value = 5
      duration = 3600 // 1 hour
      size = 18 // 5 kb/s
      ec_rate = 0.05 // Placeholder default
    }
    bd_XRayDiffract // Surveyor Alpha Spectrometer
    {
      value = 10
      duration = 43200 // 12 hours
      size = 43.2 // 10 kb/s
      ec_rate = 0.05 // Placeholder default
    }
    bd_soilScoop // Surveyor Scoop
    {
      value = 5
      duration = 10 // 10 seconds
      size = 1 // 1Mb
      ec_rate = 0.5
    }
    bd_UVscope // OAO, SOLRAD, Transit5
    {
      value = 8
      duration = 432000 // 120 hours
      size = 216 // 5 kb/s
      ec_rate = 0.05 // Placeholder default
    }
    bd_TrappedRadiation // Pioneer, Mariner, Pegasus
    {
      value = 8
      duration = 3600 // 1 hour
      size = 18 // 5 kb/s
      ec_rate = 0.05
    }
  }
}

@EXPERIMENT_DEFINITION:HAS[#id[bd_TrappedRadiation]]:NEEDS[Bluedog_DB,FeatureScience]:FOR[zzzKerbalismDefault]
{
  @baseValue = #$@KERBALISM_EXPERIMENT_VALUES/BDB/bd_TrappedRadiation/value$
  @dataScale = #$@KERBALISM_EXPERIMENT_VALUES/BDB/bd_TrappedRadiation/size$
  @dataScale /= #$baseValue$
  KERBALISM_EXPERIMENT
  {
    Situation = Space@VirtualBiomes
    VirtualBiome = NoBiome
    VirtualBiome = InnerBelt
    VirtualBiome = OuterBelt
    VirtualBiome = Magnetosphere
    VirtualBiome = Storm
  }
}

@PART[bluedog_*]:HAS[@MODULE[*ModuleScience*]:HAS[#experimentID[bd_TrappedRadiation]]]:NEEDS[Bluedog_DB,FeatureScience]:FOR[zzzKerbalismDefault]
{
    MODULE
    {
      name = Experiment
      experiment_id = bd_TrappedRadiation
      experiment_desc = Trapped Radiation Data
      data_rate = #$@KERBALISM_EXPERIMENT_VALUES/BDB/bd_TrappedRadiation/size$
      @data_rate /= #$@KERBALISM_EXPERIMENT_VALUES/BDB/bd_TrappedRadiation/duration$
      ec_rate = #$@KERBALISM_EXPERIMENT_VALUES/BDB/bd_TrappedRadiation/ec_rate$
    }
}

@EXPERIMENT_DEFINITION:HAS[#id[bd_UVscope]]:NEEDS[Bluedog_DB,FeatureScience]:FOR[zzzKerbalismDefault]
