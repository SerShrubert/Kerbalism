@PART[bluedog_Kepler_Bus,bluedog_TACSAT_Bus,bluedog_Clementine_Bus]:NEEDS[Bluedog_DB,FeatureScience]:FOR[zzzKerbalismDefault]
{
    @MODULE[HardDrive]
    {
        @dataCapacity = 500
        @sampleCapacity = 0
    }
}

// Remove some of the Kerbalism experiments from BDB parts as we already supply a lot of experiments
@PART[bluedog_*]:HAS[@MODULE[Configure]:HAS[#title[Unmanned?Experiments]]]:NEEDS[Bluedog_DB,FeatureScience]:FOR[zzzKerbalismDefault]
{
  !MODULE[Experiment]:HAS[#experiment_id[kerbalism_LITE]] {}
  !MODULE[Experiment]:HAS[#experiment_id[kerbalism_MITE]] {}
  !MODULE[Experiment]:HAS[#experiment_id[kerbalism_SITE]] {}

  @MODULE[Configure]:HAS[#title[Unmanned?Experiments]]
  {
    !SETUP[LITE] {}
    !SETUP[MITE] {}
    !SETUP[SITE] {}
  }

}


// H2O2 fuel cells
@PART[bluedog_Gemini_EquipmentModule,bluedog_Apollo_Block2_SM,bluedog_BigG_ConicSM_CargoModule,bluedog_BigG_CylindricalSM_CargoModule,bluedog_Gemini_ArrowSM,bluedog_Gemini_LunarReconSM,bluedog_MOL_EquipmentSection]:NEEDS[Bluedog_DB,ProfileDefault]:FOR[zzzKerbalismDefault]
{
  !MODULE[ModuleResourceConverter] {}
  !MODULE[ModuleB9PartSwitch]:HAS[#moduleID[fuelCellSwitch]] {}

  @mass -= 0.05

  MODULE
  {
    name = ProcessController
    resource = _FuelCell
    title = H2+O2 fuel cell
    capacity = 1
    valve_i = 1
  }

  MODULE
  {
    name = Configure
    title = Equipment Module
    slots = 2

    SETUP
    {
      name = None
      desc = Empty slot for mass and cost savings.
    }
    SETUP
    {
      name = Batteries
      desc = Extra battery storage for extended missions.
      mass = 0.01
      cost = 300
      tech = simpleCommandModules

      RESOURCE
      {
        name = ElectricCharge
        amount = 1000
        maxAmount = 1000
      }
    }
    SETUP
    {
      name = Hydrogen Oxygen Fuel Cell
      desc = Burns <b>Hydrogen</b> gas and <b>Oxygen</b> gas, producing <b>Water</b> as a by-product.
      mass = 0.05
      cost = 2250
      tech = simpleCommandModules

      MODULE
      {
        type = ProcessController
        id_field = resource
        id_value = _FuelCell
      }

      RESOURCE
      {
        name = Oxygen
        amount = 7294
        maxAmount = 7294
      }
      RESOURCE
      {
        name = Hydrogen
        amount = 14416
        maxAmount = 14416
      }
    }

  }
}
//TODO monoprop/hydrazine fuel cells

// Add additional battery capacity to crewed modules. TODO figure out how long this lasts
@PART[bluedog*,Bluedog*]:HAS[#CrewCapacity[>0],@MODULE[ModuleCommand]:HAS[#minimumCrew[>0]],@RESOURCE[ElectricCharge]]:NEEDS[Bluedog_DB,ProfileDefault]:FOR[zzzKerbalismDefault]
{
  @RESOURCE[ElectricCharge]
  {
    @amount = 100
    @amount *= #$/CrewCapacity$
    @amount += 150
    @amount += #$maxAmount$
    @maxAmount = #$amount$
  }
}

