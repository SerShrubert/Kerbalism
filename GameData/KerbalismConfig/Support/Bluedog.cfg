// ============================================================================
// Electric Charge and Life Support adjustments
// ============================================================================

// Add additional battery capacity to crewed modules. Adapted from BDB TAC config
@PART[bluedog*,Bluedog*]:HAS[#CrewCapacity[>0],@MODULE[ModuleCommand]:HAS[#minimumCrew[>0]],@RESOURCE[ElectricCharge]]:NEEDS[Bluedog_DB,ProfileDefault]:FOR[zzzKerbalismDefault]
{
  @RESOURCE[ElectricCharge]
  {
    @amount = 100
    @amount *= #$/CrewCapacity$
    @amount += 150
    @amount += #$maxAmount$
    @maxAmount = #$amount$
  }
}

// 3 days power in the Block III service module (5 Kerbals)
@PART[bluedog_Apollo_Block3_SM]:NEEDS[Bluedog_DB,ProfileDefault]:FOR[zzzKerbalismDefault]
{
  @description ^= :$: Additional battery power supporting 5 kerbals for 3 days:
  @RESOURCE[ElectricCharge]
  {
    @amount = 6000
    @maxAmount = 6000
  }
}

// 3 days power for the LEM. This doesn't count running the materials study experiment, that will cut into a good chunk of this
@PART[bluedog_LM_Ascent_Cockpit]:NEEDS[Bluedog_DB,ProfileDefault]:FOR[zzzKerbalismDefault]
{
  @description ^= :$: Additional battery power supporting 2 kerbals for 3 days:
  @RESOURCE[ElectricCharge]
  {
    @amount = 3500
    @maxAmount = 3500
  }
}

// Buff LM lab battery to support life support and experiments
@PART[bluedog_LM_Lab_Battery]:NEEDS[Bluedog_DB,ProfileDefault]:FOR[zzzKerbalismDefault]
{
  @RESOURCE[ElectricCharge]
  {
    @amount *= 4
    @maxAmount *= 4
  }
}

// Small satellite EC adjustments
// ============================================================================
// Give early IDCSP relay more EC to survive more than 5 minutes in the dark
// but not too much, and do not increase the solar panel output
// by Gordon Dry
// ============================================================================
@PART[bluedog_IDCSP_Probe]:NEEDS[Bluedog_DB,FeatureScience]:FOR[zzzKerbalismDefault]
{
  @RESOURCE[ElectricCharge]
  {
    @amount = 12 // old value 5, enough for about 8 minutes, so now about 20 minutes
    @maxAmount = 12
  }
}

// Reduce internal transmitter usage on small satellites


// Life support resources to add in addition to the profile default of 5 days
// These are assuming that Eating, Drinking and Oxygen consumption on scaled systems are adjusted in the default profile such that
// the same amount of supply is suitable for the same amount of Kerbin "Days"

// Extra nitrogen for EVAs
@PART[bluedog_LM_Ascent_Cockpit]:NEEDS[Bluedog_DB,ProfileDefault]:FOR[zzzKerbalismDefault]
{
  NitrogenMultiplier = 2
}
// Gemini 10 days of food. Water from fuel cell, Oxygen from fuel cell supply
@PART[bluedog_Gemini_Capsule]:NEEDS[Bluedog_DB,ProfileDefault]:FOR[zzzKerbalismDefault]
{
  DaysOfFood = 5
}

// Apollo block 2 15 days of food. Water from fuel cell, Oxygen from fuel cell supply
@PART[bluedog_Apollo_CrewPod]:NEEDS[Bluedog_DB,ProfileDefault]:FOR[zzzKerbalismDefault]
{
  DaysOfFood = 10
}

// Lunar shelters and labs 30 days of life support per description
// Also give life support supply to both MORL and Gemini modular station
@PART[bluedog_EarlyLunarShelter,bluedog_Apollo_RCML,bluedog_LM_Lab,bluedog_LM_Shelter,bluedog_Gemini_OneRoomStationModule,bluedog_MORL_workshop]:NEEDS[Bluedog_DB,ProfileDefault]:FOR[zzzKerbalismDefault]
{
  DaysOfFood = 25
  DaysOfWater = 25
  DaysOfOxygen = 25
}

// SheLab 3 months per description
@PART[bluedog_LM_SheLab]:NEEDS[Bluedog_DB,ProfileDefault]:FOR[zzzKerbalismDefault]
{
  DaysOfFood = 85
  DaysOfWater = 12.75 // Assume water recycling at 85% efficiency
  DaysOfOxygen = 85
}

// Extra nitrogen for EVAs. Need to test if returning from EVAs returns nitrogen to storage
@PART[bluedog_EarlyLunarShelter,bluedog_Apollo_RCML,bluedog_LM_Lab,bluedog_LM_Shelter,bluedog_LM_SheLab]:NEEDS[Bluedog_DB,ProfileDefault]:FOR[zzzKerbalismDefault]
{
  NitrogenMultiplier = 4
}

// MOL laboratory is not a crew pod, but it gets 20 days of supplies in addition to the 10 from Gemini. 
// Assumes H2O2 fuel cell in the equipment module providing water and oxygen supply
@PART[bluedog_MOL_Lab_New]:NEEDS[Bluedog_DB,ProfileDefault]:FOR[zzzKerbalismDefault]
{
  DaysOfFood = 20
}

// Skylab and Spacelab airlock modules provide life support for the rest of the lab
// TAC-LS patch mentions 6 kerbals for 7 months. Reducing this to support 3 kerbals for 6 months; closer to the actual amount of supply on skylab
// This airlock has a capacity of 1, so use 3x the supply
@PART[bluedog_Skylab_airlockModule_SAF,bluedog_spacelab_forwardAdapter_SAF,bluedog_Skylab_airlockModule,bluedog_spacelab_forwardAdapter,bluedog_Skylab_wetWorkshop_airlockMDA]:NEEDS[Bluedog_DB,ProfileDefault]:FOR[zzzKerbalismDefault]
{
  DaysOfFood = 540
  DaysOfWater = 81 // Assume water recycling at 85% efficiency
  DaysOfOxygen = 540
  NitrogenMultiplier = 6

  // Uprate the Skylab/Spacelab airlock life support systems
  @MODULE[ProcessController],*
  {
    @capacity *= 3
  }
}

// ETS orbital mission modules. Extra supply for deep space missions
@PART[bluedog_Apollo_Block3_MissionModule]:NEEDS[Bluedog_DB,ProfileDefault]:FOR[zzzKerbalismDefault]
{
  DaysOfFood = 30
  DaysOfWater = 4.5 // Assume water recycling at 85% efficiency
  DaysOfOxygen = 30
}
@PART[bluedog_Apollo_Block4_MissionModule]:NEEDS[Bluedog_DB,ProfileDefault]:FOR[zzzKerbalismDefault]
{
  DaysOfFood = 45
  DaysOfWater = 6.75 // Assume water recycling at 85% efficiency
  DaysOfOxygen = 45
}

// Venus flyby systems module. 2 years for 3 crew. This part is for 2 crew so multiply days by 3/2
@PART[bluedog_Skylab_VFB_ESM]:NEEDS[Bluedog_DB,ProfileDefault]:FOR[zzzKerbalismDefault]
{
  DaysOfFood = 1095
  DaysOfWater = 165 // Assume water recycling at 85% efficiency
  DaysOfOxygen = 1095
  NitrogenMultiplier = 10 // Generous supply for leaks and occasional EVA
}

@PART[bluedog_*]:HAS[#DaysOfFood[>0],#CrewCapacity[>0]]:NEEDS[Bluedog_DB,ProfileDefault]:FOR[zzzKerbalismDefault]
{
  RESOURCE
  {
    name = Food
    amount = 0.262
    @amount *= #$/CrewCapacity$
    @amount *= #$/DaysOfFood$
    maxAmount = #$amount$
  }
}

@PART[bluedog_*]:HAS[#DaysOfWater[>0],#CrewCapacity[>0]]:NEEDS[Bluedog_DB,ProfileDefault]:FOR[zzzKerbalismDefault]
{
  RESOURCE
  {
    name = Water
    amount = 0.14
    @amount *= #$/CrewCapacity$
    @amount *= #$/DaysOfWater$
    maxAmount = #$amount$
  }
}

@PART[bluedog_*]:HAS[#DaysOfOxygen[>0],#CrewCapacity[>0]]:NEEDS[Bluedog_DB,ProfileDefault]:FOR[zzzKerbalismDefault]
{
  RESOURCE
  {
    name = Oxygen
    amount = 37.2
    @amount *= #$/CrewCapacity$
    @amount *= #$/DaysOfOxygen$
    maxAmount = #$amount$
  }
}

// Increase nitrogen supply for parts that expect more EVAs
@PART[bluedog_*]:HAS[#NitrogenMultiplier[>0],@MODULE[Configure]:HAS[@SETUP[pressure?control]]]:NEEDS[Bluedog_DB,ProfileDefault]:FOR[zzzKerbalismDefault]
{
  @MODULE[Configure]
  {
    @SETUP[pressure?control]
    {
      @RESOURCE[Nitrogen]
      {
        @amount *= #$/NitrogenMultiplier$
        @maxAmount = #$amount$
      }
    }
  }
}


