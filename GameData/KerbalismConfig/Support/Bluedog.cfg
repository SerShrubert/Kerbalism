    {
      name = Experiment
      experiment_id = bd_atm
      data_rate = #$@KERBALISM_EXPERIMENT_VALUES/BDB/bd_atm/size$
      @data_rate /= #$@KERBALISM_EXPERIMENT_VALUES/BDB/bd_atm/duration$
      ec_rate = #$@KERBALISM_EXPERIMENT_VALUES/BDB/bd_atm/ec_rate$
