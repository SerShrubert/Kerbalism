@PART[bluedog_MORL_PBG,bluedog_LM_RTG_Rack,bluedog_LM_RTG_Folding,bluedog_Transit5_RTG,bluedog_Transit5_SNAP9A,bluedog_RTG_GPHS,bluedog_RTG_MHWRTG,bluedog_RTG_RHU,bluedog_RTG_SNAP3,bluedog_RTG_SNAP19_Quad,bluedog_RTG_SNAP19_Nimbus,bluedog_Pioneer_SNAP19,bluedog_RTG_SNAP19,bluedog_voyagerMarsLander_RTG]:HAS[@MODULE[ModuleGenerator]]:NEEDS[Bluedog_DB,ProfileDefault]:FOR[zzzKerbalismDefault]
{
    MODULE
    {
        name = Emitter
        radiation = 0.00001388875 // 0.05 rad/h
        @radiation *= #$../MODULE[ModuleGenerator]/OUTPUT_RESOURCE[ElectricCharge]/rate$
    }

    MODULE
    {
        name = ProcessController
        resource = _RTG
        title = #KERBALISM_RTG_title
        capacity = #$../MODULE[ModuleGenerator]/OUTPUT_RESOURCE[ElectricCharge]/rate$
        running = true
        toggle = false
    }

    !MODULE[ModuleGenerator] {}
    !MODULE[ModuleCoreHeat] {}
}

