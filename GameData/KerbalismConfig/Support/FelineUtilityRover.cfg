// ============================================================================
// FelineUtilityRover
// Kerbalism support for Lynx drill / ISRU.
// Base path: ProcessController / Harvester (no SystemHeat).
// With SystemHeat: generic SystemHeat.cfg FINAL converters upgrade those
// modules to ProcessControllerSystemHeat / HarvesterSystemHeat.
// ============================================================================


// ============================================================================
// Lynx rear drill -> Kerbalism Harvester (MiniDrill-equivalent)
// ============================================================================
@PART[Lynx_DrillRear]:NEEDS[FelineUtilityRover,ProfileDefault,!Pathfinder]:AFTER[KerbalismDefault]
{
	!MODULE[ModuleKerbetrotterHarvesterSwitch],* {}
	!MODULE[ModuleResourceHarvester],* {}
	!MODULE[ModuleOverheatDisplay],* {}
	!MODULE[ModuleCoreHeat],* {}
	!MODULE[SystemHeatHarvesterKerbalism],* {}
	!MODULE[ModuleSystemHeatHarvester],* {}
	!MODULE[HarvesterSystemHeat],* {}
	!MODULE[Harvester],* {}
	!MODULE[Configure]:HAS[#configureId[Drill]],* {}

	MODULE
	{
		name = Harvester
		title = #KERBALISM_WaterExcavation_title
		type = 0
		resource = Water
		min_abundance = 0.01
		rate = 0.003
		abundance_rate = 0.1
		ec_rate = 1.0
		drill = ImpactTransform
		length = 1.08
	}

	MODULE
	{
		name = Harvester
		title = #KERBALISM_OreExcavation_title
		type = 0
		resource = Ore
		min_abundance = 0.02
		rate = 0.0025
		ec_rate = 1.0
		drill = ImpactTransform
		length = 1.08
	}

	MODULE
	{
		name = Harvester
		title = #KERBALISM_NitrogenExcavation_title
		type = 0
		resource = Nitrogen
		min_abundance = 0.02
		rate = 0.0025
		ec_rate = 1.0
		drill = ImpactTransform
		length = 1.08
	}

	MODULE
	{
		name = Configure
		configureId = Drill
		title = #KERBALISM_BranchLoc_Drill
		slots = 1

		SETUP
		{
			name = Water Extraction
			title = #KERBALISM_BranchLoc_Water_Extraction
			desc = #KERBALISM_WaterExcavation_desc

			MODULE
			{
				type = Harvester
				id_field = resource
				id_value = Water
			}

			RESOURCE
			{
				name = Water
				amount = 0
				maxAmount = 50
			}
		}

		SETUP
		{
			name = Ore Extraction
			title = #KERBALISM_BranchLoc_Ore_Extraction
			desc = #KERBALISM_OreExcavation_desc

			MODULE
			{
				type = Harvester
				id_field = resource
				id_value = Ore
			}

			RESOURCE
			{
				name = Ore
				amount = 0
				maxAmount = 50
			}
		}

		SETUP
		{
			name = Nitrogen Extraction
			title = #KERBALISM_BranchLoc_Nitrogen_Extraction
			desc = #KERBALISM_NitrogenExcavation_desc

			MODULE
			{
				type = Harvester
				id_field = resource
				id_value = Nitrogen
			}

			RESOURCE
			{
				name = Nitrogen
				amount = 0
				maxAmount = 50
			}
		}
	}

	MODULE:NEEDS[FeatureReliability]
	{
		name = Reliability
		type = Harvester
		title = #KERBALISM_Harvester_title
		repair = Engineer
		mtbf = 72576000
		extra_cost = 1.0
		extra_mass = 0.2
	}
}


