// ============================================================================
// SystemHeat path: strip leftover stock / Kerbetrotter modules after conversion
// (generic SystemHeat.cfg FINAL patches upgrade Harvester -> HarvesterSystemHeat)
// ============================================================================
@PART[Lynx_DrillRear]:HAS[@MODULE[Configure]:HAS[#configureId[Drill]]]:NEEDS[FelineUtilityRover,SystemHeat,!Pathfinder]:FINAL
{
	!MODULE[ModuleKerbetrotterHarvesterSwitch],* {}
	!MODULE[ModuleResourceHarvester],* {}
	!MODULE[ModuleAsteroidDrill],* {}
	!MODULE[ModuleCometDrill],* {}
	!MODULE[ModuleOverheatDisplay],* {}
	!MODULE[ModuleCoreHeat],* {}
	!MODULE[SystemHeatHarvesterKerbalism],* {}
	!MODULE[ModuleSystemHeatHarvester],* {}
}


// ============================================================================
// Lynx ISRU -> Kerbalism Chemical Plant (MiniISRU-equivalent capacity)
// ============================================================================
@PART[Lynx_ISRU]:NEEDS[FelineUtilityRover,ProfileDefault]:AFTER[KerbalismDefault]
{
	!MODULE[ModuleKerbetrotterConverterSwitch],* {}
	!MODULE[ModuleResourceConverter],* {}
	!MODULE[ModuleOverheatDisplay],* {}
	!MODULE[ModuleCoreHeat],* {}
	!MODULE[ModuleSystemHeatConverter],* {}
	!MODULE[SystemHeatConverterKerbalism],* {}
	!MODULE[ProcessControllerSystemHeat],* {}
	!MODULE[ProcessController],* {}
	!MODULE[Configure]:HAS[#configureId[ChemicalPlant]],* {}

	MODULE
	{
		name = ProcessController
		resource = _WaterElectrolysis
		title = #KERBALISM_WaterElectrolysis_title
		capacity = 36
	}

	MODULE
	{
		name = ProcessController
		resource = _Sabatier
		title = #KERBALISM_SabatierProcess_title
		capacity = 36
		valve_i = 2
	}

	MODULE
	{
		name = ProcessController
		resource = _Haber
		title = #KERBALISM_HaberProcess_title
		capacity = 36
	}

	MODULE
	{
		name = ProcessController
		resource = _WasteIncinerator
		title = #KERBALISM_WasteIncinerator_title
		capacity = 36
	}

	MODULE
	{
		name = ProcessController
		resource = _WasteCompressor
		title = #KERBALISM_WasteCompressor_title
		capacity = 36
	}

	MODULE
	{
		name = ProcessController
		resource = _Anthraquinone
		title = #KERBALISM_AnthraquinoneProcess_title
		capacity = 36
	}

	MODULE
	{
		name = ProcessController
		resource = _HydrazineProduction
		title = #KERBALISM_HydrazineProduction_title
		capacity = 36
	}

	MODULE
	{
		name = ProcessController
		resource = _NitroHydrazine
		title = #KERBALISM_HydrazineProductionN2_title
		capacity = 36
	}

	MODULE
	{
		name = ProcessController
		resource = _MRE
		title = #KERBALISM_MoltenRegolithElectrolysis_title
		capacity = 36
	}

	MODULE
	{
		name = ProcessController
		resource = _SOE
		title = #KERBALISM_SolidOxideElectrolysis_title
		capacity = 36
	}

	MODULE
	{
		name = ProcessController
		resource = _SCO
		title = #KERBALISM_SelectiveCatalyticOxidation_title
		capacity = 36
	}

	MODULE
	{
		name = Configure
		configureId = ChemicalPlant
		title = #KERBALISM_BranchLoc_Chemical_Plant
		slots = 1

		UPGRADES
		{
			UPGRADE
			{
				name__ = Upgrade-Slots
				techRequired__ = electronics
				slots = 0
			}
		}

		SETUP
		{
			name = Water Electrolysis
			title = #KERBALISM_Process_WaterElectrolysis
			desc = #KERBALISM_WaterElectrolysis_desc

			MODULE
			{
				type = ProcessController
				id_field = resource
				id_value = _WaterElectrolysis
			}
		}

		SETUP
		{
			name = Sabatier Process
			title = #KERBALISM_Process_SabatierProcess
			desc = #KERBALISM_SabatierProcess_desc

			MODULE
			{
				type = ProcessController
				id_field = resource
				id_value = _Sabatier
			}
		}

		SETUP
		{
			name = Haber Process
			title = #KERBALISM_Process_HaberProcess
			desc = #KERBALISM_HaberProcess_desc

			MODULE
			{
				type = ProcessController
				id_field = resource
				id_value = _Haber
			}
		}

		SETUP
		{
			name = Waste Incinerator
			title = #KERBALISM_Process_WasteIncinerator
			desc = #KERBALISM_WasteIncinerator_desc
			tech = precisionEngineering

			MODULE
			{
				type = ProcessController
				id_field = resource
				id_value = _WasteIncinerator
			}
		}

		SETUP
		{
			name = Waste Compressor
			title = #KERBALISM_Process_WasteCompressor
			desc = #KERBALISM_WasteCompressor_desc
			tech = precisionEngineering

			MODULE
			{
				type = ProcessController
				id_field = resource
				id_value = _WasteCompressor
			}
		}

		SETUP
		{
			name = Anthraquinone Process
			title = #KERBALISM_Process_AnthraquinoneProcess
			desc = #KERBALISM_AnthraquinoneProcess_desc
			tech = advScienceTech

			MODULE
			{
				type = ProcessController
				id_field = resource
				id_value = _Anthraquinone
			}
		}

		SETUP
		{
			name = Hydrazine Production
			title = #KERBALISM_Process_HydrazineProduction
			desc = #KERBALISM_HydrazineProduction_desc
			tech = advScienceTech

			MODULE
			{
				type = ProcessController
				id_field = resource
				id_value = _HydrazineProduction
			}
		}

		SETUP
		{
			name = Hydrazine Production (N2 Injection)
			title = #KERBALISM_Process_HydrazineProductionN2
			desc = #KERBALISM_HydrazineProductionN2_desc
			tech = experimentalScience

			MODULE
			{
				type = ProcessController
				id_field = resource
				id_value = _NitroHydrazine
			}
		}

		SETUP
		{
			name = Solid Oxide Electrolysis
			title = #KERBALISM_Process_SolidOxideElectrolysis
			desc = #KERBALISM_SolidOxideElectrolysis_desc
			tech = experimentalScience

			MODULE
			{
				type = ProcessController
				id_field = resource
				id_value = _SOE
			}
		}

		SETUP
		{
			name = Molten Regolith Electrolysis
			title = #KERBALISM_Process_MoltenRegolithElectrolysis
			desc = #KERBALISM_MoltenRegolithElectrolysis_desc
			tech = advScienceTech

			MODULE
			{
				type = ProcessController
				id_field = resource
				id_value = _MRE
			}
		}

		SETUP
		{
			name = Selective Catalytic Oxidation
			title = #KERBALISM_Process_SelectiveCatalyticOxidation
			desc = #KERBALISM_SelectiveCatalyticOxidation_desc
			tech = experimentalScience

			MODULE
			{
				type = ProcessController
				id_field = resource
				id_value = _SCO
			}
		}
	}

	MODULE:NEEDS[FeatureReliability]
	{
		name = Reliability
		type = ProcessController
		title = #KERBALISM_ChemicalPlant_title
		repair = Engineer
		mtbf = 72576000
		extra_cost = 1.0
		extra_mass = 0.2
	}
}


// ============================================================================
// CryoTanks liquefaction / evaporation on Lynx ISRU (MiniISRU-equivalent)
// ============================================================================
@PART[Lynx_ISRU]:HAS[@MODULE[Configure]:HAS[#configureId[ChemicalPlant],!SETUP[h2?to?lh2?converter]]]:NEEDS[FelineUtilityRover,CryoTanks,ProfileDefault]:AFTER[zzz_CryoTanks]
{
	MODULE
	{
		name = ProcessController
		resource = _H2Converter
		title = #KERBALISM_BranchLoc_Hydrogen_liquefaction
		capacity = 36
		running = true
	}

	@MODULE[Configure]:HAS[#configureId[ChemicalPlant]]
	{
		SETUP
		{
			name = #KERBALISM_BranchLoc_Hydrogen_liquefaction
			desc = #KERBALISM_BranchLoc_Liquefy_Hydrogen_gas_into_Liquid_Hydrogen
			tech = advFuelSystems

			MODULE
			{
				type = ProcessController
				id_field = resource
				id_value = _H2Converter
			}

			RESOURCE
			{
				name = Hydrogen
				amount = 0
				maxAmount = 4500
			}
		}
	}
}

@PART[Lynx_ISRU]:HAS[@MODULE[Configure]:HAS[#configureId[ChemicalPlant],!SETUP[LH2?to?H2?Converter]]]:NEEDS[FelineUtilityRover,CryoTanks,ProfileDefault]:AFTER[zzz_CryoTanks]
{
	MODULE
	{
		name = ProcessController
		resource = _LH2Converter
		title = #KERBALISM_BranchLoc_LH2_evaporator
		capacity = 36
		running = true
	}

	@MODULE[Configure]:HAS[#configureId[ChemicalPlant]]
	{
		SETUP
		{
			name = #KERBALISM_BranchLoc_LH2_evaporator
			desc = #KERBALISM_BranchLoc_Evaporate_Liquid_Hydrogen_into_Hydrogen_gas
			tech = advFuelSystems

			MODULE
			{
				type = ProcessController
				id_field = resource
				id_value = _LH2Converter
			}
		}
	}
}


// ============================================================================
// SystemHeat path: strip leftover stock / Kerbetrotter modules after conversion
// (generic SystemHeat.cfg FINAL patches upgrade ProcessController -> ProcessControllerSystemHeat)
// ============================================================================
@PART[Lynx_ISRU]:HAS[@MODULE[Configure]:HAS[#configureId[ChemicalPlant]]]:NEEDS[FelineUtilityRover,SystemHeat]:FINAL
{
	!MODULE[ModuleKerbetrotterConverterSwitch],* {}
	!MODULE[ModuleResourceConverter],* {}
	!MODULE[ModuleOverheatDisplay],* {}
	!MODULE[ModuleCoreHeat],* {}
	!MODULE[ModuleSystemHeatConverter],* {}
	!MODULE[SystemHeatConverterKerbalism],* {}
	!MODULE[Reliability]:HAS[#type[ModuleResourceConverter]],* {}
}
