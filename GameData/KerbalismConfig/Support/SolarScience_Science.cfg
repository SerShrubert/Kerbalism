// ============================================================================
// Solar Science (SOL) - Kerbalism science support
// https://github.com/Kerbalism/Kerbalism/issues/842
// https://github.com/zer0Kerbal/SolarScience/issues/22
//
// Two SOHO/STEREO-inspired imagers that only operate in solar SOI.
// Stock ModuleScienceExperiment subclasses are replaced with Kerbalism Experiment.
//
// Balance notes (real-world telemetry):
// - STEREO/SECCHI synoptic downlink ~200-585 MB/day (prime mission ~540-585 MB/day)
//   → STEREO size ≈ one full day of imaging product, duration 1 day
// - KMI ≈ smaller SOHO/HMI-style magnetograph: ~1/3–1/4 of that, half-day session
// Science values match SolarScience ScienceDefs (KMI 5/7, STEREO 15/30).
// Data is stored on the vessel probe drive (no private HardDrive on these parts).
// Tech: stock parts unlock far too early (basicScience / scienceTech) for Kerbol-pointing
// observatories — moved later to match interplanetary science cadence.
// ============================================================================

@KERBALISM_EXPERIMENT_VALUES:NEEDS[SolarScience,FeatureScience]
{
	SolarScience
	{
		// Kerbolic Magnetic Imager - early SOHO/HMI-style magnetograph
		KMI
		{
			ECCost = 0.35
			size = 150								// ~half-day magnetograph product
			baseValue = 5							// match SolarScience ScienceDefs
			scienceCap = 7
			duration = 43200						// 12 hours
			// HomeStarDistance*: heliocentric distance as fraction of home-body SMA (Kerbin/Earth AU).
			requirements = AngularVelocityMax:0.05,SunPointingMax:10,HomeStarDistanceMin:0.8,HomeStarDistanceMax:1.2
			ResourceRates =
			UnlockTech = scienceTech				// stock was basicScience
		}

		// STEREO multi-tube solar imager - SECCHI-style observatory
		STEREO
		{
			ECCost = 1.2
			size = 550								// ~1 day SECCHI synoptic (~450-585 MB/day)
			baseValue = 15							// match SolarScience ScienceDefs
			scienceCap = 30
			duration = 86400						// 1 day
			requirements = AngularVelocityMax:0.05,SunPointingMax:10,HomeStarDistanceMin:0.8,HomeStarDistanceMax:1.2
			ResourceRates =
			UnlockTech = advExploration				// stock was scienceTech
		}
	}
}

// CTT: push further into specialized / long-term science nodes
@KERBALISM_EXPERIMENT_VALUES:NEEDS[CommunityTechTree,SolarScience,FeatureScience]:BEFORE[KerbalismDefault]
{
	@SolarScience
	{
		@KMI
		{
			@UnlockTech = advScienceTech
		}
		@STEREO
		{
			@UnlockTech = specializedScienceTech
		}
	}
}

// ============================================================================
// Replace stock experiment modules
// ============================================================================

@PART[KMI]:HAS[@MODULE:HAS[#experimentID[KMI]]]:NEEDS[SolarScience,FeatureScience]
{
	!MODULE:HAS[#experimentID[KMI]] {}
	!MODULE[ModuleAnimateGeneric] {}

	MODULE
	{
		name = Experiment
		experiment_id = KMI
		anim_deploy = KMI_Animation_Deploy
		pointing_axis = Forward
		retractedDragCube = B
		deployedDragCube = A
		allow_shrouded = False
	}

	MODULE
	{
		name = ExperimentResultImage
		experiment_id = KMI
		// SDO/HMI continuum magnetogram (SOHO-heritage style product)
		// Keep the URL scheme-less because KSP config syntax treats '//' as a comment.
		image_url = sdo.gsfc.nasa.gov/assets/img/latest/latest_1024_HMIB.jpg
		image_backup = SolarScience/Plugins/Textures/latest_1024_HMIB
		image_title = #SOL-KMI-titl
	}
}

@PART[STEREO]:HAS[@MODULE:HAS[#experimentID[STEREO]]]:NEEDS[SolarScience,FeatureScience]
{
	!MODULE:HAS[#experimentID[STEREO]] {}
	!MODULE[ModuleAnimateGeneric] {}

	MODULE
	{
		name = Experiment
		experiment_id = STEREO
		anim_deploy = Stereo_Animation_Deploy
		pointing_axis = NegRight
		retractedDragCube = B
		deployedDragCube = A
		allow_shrouded = False
	}

	MODULE
	{
		name = ExperimentResultImage
		experiment_id = STEREO
		// SDO/AIA multi-wavelength composite (STEREO/SECCHI-style product)
		// Keep the URL scheme-less because KSP config syntax treats '//' as a comment.
		image_url = sdo.gsfc.nasa.gov/assets/img/latest/latest_1024_211193171.jpg
		image_backup = SolarScience/Plugins/Textures/latest_1024_211193171
		image_title = #SOL-STEREO-titl
	}
}

// ============================================================================
// Apply experiment values
// ============================================================================

@PART[*]:HAS[@MODULE[Experiment]]:NEEDS[SolarScience,FeatureScience]:FOR[KerbalismDefault]
{
	@MODULE[Experiment]:HAS[#experiment_id[KMI]]
	{
		%experiment_description = Kerbolic magnetic / Doppler images of the local star.
		%ec_rate = #$@KERBALISM_EXPERIMENT_VALUES/SolarScience/KMI/ECCost$
		%requires = #$@KERBALISM_EXPERIMENT_VALUES/SolarScience/KMI/requirements$
		%data_rate = #$@KERBALISM_EXPERIMENT_VALUES/SolarScience/KMI/size$
		@data_rate /= #$@KERBALISM_EXPERIMENT_VALUES/SolarScience/KMI/duration$
		%resources = #$@KERBALISM_EXPERIMENT_VALUES/SolarScience/KMI/ResourceRates$
		%allow_shrouded = False
	}

	@MODULE[Experiment]:HAS[#experiment_id[STEREO]]
	{
		%experiment_description = Multi-spectral solar images (STEREO-style observatory).
		%ec_rate = #$@KERBALISM_EXPERIMENT_VALUES/SolarScience/STEREO/ECCost$
		%requires = #$@KERBALISM_EXPERIMENT_VALUES/SolarScience/STEREO/requirements$
		%data_rate = #$@KERBALISM_EXPERIMENT_VALUES/SolarScience/STEREO/size$
		@data_rate /= #$@KERBALISM_EXPERIMENT_VALUES/SolarScience/STEREO/duration$
		%resources = #$@KERBALISM_EXPERIMENT_VALUES/SolarScience/STEREO/ResourceRates$
		%allow_shrouded = False
	}
}

// ============================================================================
// Tech tree unlocks (parts)
// ============================================================================

@PART[KMI]:NEEDS[SolarScience,FeatureScience]:FOR[zzzKerbalismDefault]
{
	@TechRequired = #$@KERBALISM_EXPERIMENT_VALUES/SolarScience/KMI/UnlockTech$
}

@PART[STEREO]:NEEDS[SolarScience,FeatureScience]:FOR[zzzKerbalismDefault]
{
	@TechRequired = #$@KERBALISM_EXPERIMENT_VALUES/SolarScience/STEREO/UnlockTech$
}

// ============================================================================
// Experiment definitions - solar SOI only.
// Use InSpaceHigh (not Space→InSpaceLow) so the sun's high low-space science multiplier is avoided.
// Heliocentric band is still enforced by HomeStarDistance* requirements.
// ============================================================================

@EXPERIMENT_DEFINITION:HAS[#id[KMI]]:NEEDS[SolarScience,FeatureScience]:FOR[zzzKerbalismDefault]
{
	@baseValue = #$@KERBALISM_EXPERIMENT_VALUES/SolarScience/KMI/baseValue$
	@scienceCap = #$@KERBALISM_EXPERIMENT_VALUES/SolarScience/KMI/scienceCap$
	@dataScale = #$@KERBALISM_EXPERIMENT_VALUES/SolarScience/KMI/size$
	@dataScale /= #$baseValue$

	KERBALISM_EXPERIMENT
	{
		Situation = InSpaceHigh
		BodyAllowed = Suns
	}
}

@EXPERIMENT_DEFINITION:HAS[#id[STEREO]]:NEEDS[SolarScience,FeatureScience]:FOR[zzzKerbalismDefault]
{
	@baseValue = #$@KERBALISM_EXPERIMENT_VALUES/SolarScience/STEREO/baseValue$
	@scienceCap = #$@KERBALISM_EXPERIMENT_VALUES/SolarScience/STEREO/scienceCap$
	@dataScale = #$@KERBALISM_EXPERIMENT_VALUES/SolarScience/STEREO/size$
	@dataScale /= #$baseValue$

	KERBALISM_EXPERIMENT
	{
		Situation = InSpaceHigh
		BodyAllowed = Suns
	}
}
