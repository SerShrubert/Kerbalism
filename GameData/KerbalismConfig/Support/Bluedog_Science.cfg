// Remove some of the Kerbalism experiments from BDB parts as we already supply a lot of experiments. 
@PART[bluedog_*]:HAS[@MODULE[Configure]:HAS[#title[Unmanned?Experiments]]]:FOR[zzzKerbalismDefault]:NEEDS[Bluedog_DB,FeatureScience]
{
    !MODULE[Experiment]:HAS[#experiment_id[kerbalism_MITE]] {}
    !MODULE[Experiment]:HAS[#experiment_id[kerbalism_SITE]] {}

    @MODULE[Configure]:HAS[#title[Unmanned?Experiments]]
    {
        !SETUP[MITE] {}
        !SETUP[SITE] {}
    }
}

// Electric charge adjustment to support experiments
@PART[bluedog_OFO_Experiment]:FOR[zzzKerbalismDefault]:NEEDS[Bluedog_DB,FeatureScience]
{
    // Add batteries to allow experiment to complete without power generation
    RESOURCE
    {
        name = ElectricCharge
        amount = 200
    }
}

@PART[bluedog_Biosat_Adapter]:FOR[zzzKerbalismDefault]:NEEDS[Bluedog_DB,FeatureScience]
{
    // Buff batteries to allow experiment to complete without power generation
    @RESOURCE[ElectricCharge]
    {
        @amount *= 5
    }
}

@PART[bluedog_Agena_Avionics]:FOR[zzzKerbalismDefault]:NEEDS[Bluedog_DB,FeatureScience]
{
    // Buff batteries to allow Agena Target Vehicle and Corona satellites to exist for longer without relying on fuel cell
    @RESOURCE[ElectricCharge]
    {
        @amount *= 5
    }
}

// Improve OV1-10 solar panels to allow it to run its experiments
@PART[bluedog_OV1_10_probeCore]:FOR[zzzKerbalismDefault]:NEEDS[Bluedog_DB,FeatureScience]
{
    @RESOURCE[ElectricCharge]
    {
        @amount *= 5
    }

    @MODULE[ModuleDeployableSolarPanel]
    {
        @chargeRate *= 4
    }
}

// ============================================================================
// Laboratories
// ============================================================================

// Tiny and early laboratories
//bluedog_MOL_1p5mStationSegment survivability 0.7t
//bluedog_MiniLab_Lab survivability 0.5t
@PART[bluedog_MOL_1p5mStationSegment,bluedog_MiniLab_Lab]:AFTER[KerbalismDefault]:NEEDS[Bluedog_DB,FeatureScience]
{
    %MODULE
    {
        name = Laboratory
        researcher = Scientist
        analysis_rate = 0.002 // 2 kbps
        ec_rate = 0.4
    }

    !MODULE[ModuleScienceLab] {}
    !MODULE[ModuleScienceConverter] {}
}

// Small and early laboratories
//bluedog_MOL_Lab_New 2.1t basicScience
@PART[bluedog_MOL_Lab_New]:AFTER[KerbalismDefault]:NEEDS[Bluedog_DB,FeatureScience]
{
    %MODULE
    {
        name = Laboratory
        researcher = Scientist
        analysis_rate = 0.003 // 3 kbps
        ec_rate = 0.6
    }

    !MODULE[ModuleScienceLab] {}
    !MODULE[ModuleScienceConverter] {}
}

// Labs close to stock lab in mass and tech get Kerbalism's default patch
//bluedog_spacelab_europeanModule 4t advMetalworks
//bluedog_LM_SheLab 2.8t heavyLanding
//bluedog_LM_Lab 2.5t advExploration
//bluedog_Apollo_RCML 3.5t commandModules

// Heavy laboratories
//bluedog_Skylab_Workshop 25t specializedConstruction
//bluedog_Skylab_WetWorkshop 7.3t specializedConstruction
//bluedog_Skylab_VFB_lightweightWetWorkshop 9.32t advMetalworks
//bluedog_Saturn_S2_wetWorkshop 35t heavierRocketry
@PART[bluedog_Skylab_Workshop,bluedog_Skylab_WetWorkshop,bluedog_Skylab_VFB_lightweightWetWorkshop,bluedog_Saturn_S2_wetWorkshop]:AFTER[KerbalismDefault]:NEEDS[Bluedog_DB,FeatureScience]
{
    %MODULE
    {
        name = Laboratory
        researcher = Scientist
        analysis_rate = 0.01 // 10 kbps, twice as fast as default laboratories
        ec_rate = 2
    }

    !MODULE[ModuleScienceLab] {}
    !MODULE[ModuleScienceConverter] {}
}

// ============================================================================
// Contract adjustments
// ============================================================================
@CONTRACT_TYPE[BDB_Gemini]:FOR[zzzKerbalismDefault]:NEEDS[Bluedog_DB,FeatureScience]
{
    @DATA[experimentslist]
    {
        %experiments = [logmmImpacts, geigerCounter]
    }
}

@CONTRACT_TYPE[BDB_AIMP]:FOR[zzzKerbalismDefault]:NEEDS[Bluedog_DB,FeatureScience]
{
    @DATA[experimentslist]
    {
        %experiments = [magnetometer]
    }
}

@CONTRACT_TYPE[BDB_Apollo]:FOR[zzzKerbalismDefault]:NEEDS[Bluedog_DB,FeatureScience]
{
    @PARAMETER[CollectScienceB]
    {
        @recoveryMethod = Ideal
        %experiment = [bd_camera, bd_massSpec, bd_drill]
    }
}

@CONTRACT_TYPE[BDB_Corona_KH1]:FOR[zzzKerbalismDefault]:NEEDS[Bluedog_DB,FeatureScience]
{
    @notes = In assembly, use the tag 'KH1' to find components fitting for this mission. Manually start the experiment when over the required biome to avoid wasting film.

    @DATA[target]
    {
        @targetBody1 = HomeWorld()
    }
}

@CONTRACT_TYPE[BDB_Corona_KH4]:FOR[zzzKerbalismDefault]:NEEDS[Bluedog_DB,FeatureScience]
{
    @notes = In assembly, use the tag 'KH4' to find components fitting for this mission. Start the experiment only above the required biome to avoid wasting film mapping unspecified biomes.

    @DATA[target]
    {
        @targetBody1 = HomeWorld()
    }
}

// This may be difficult to complete. Recommend only starting the experiment while in the specified biome, then stopping it.
@CONTRACT_TYPE[BDB_Gambit]:FOR[zzzKerbalismDefault]:NEEDS[Bluedog_DB,FeatureScience]
{
    @notes = In assembly, use the tag 'KH8' to find components fitting for this mission. For best results, start and stop the experiment while over the specified biome until your hard drive contains all of the required situations. Then let the experiment run in the background. This may take a while.
    @DATA[target]
    {
        @targetBody1 = HomeWorld()
    }
}

@CONTRACT_TYPE[BDB_Lunar_Orbiter]:FOR[zzzKerbalismDefault]:NEEDS[Bluedog_DB,FeatureScience]
{
    @DATA[experimentslist]
    {
        %experiments = [bd_camera, geigerCounter]
    }
}

@CONTRACT_TYPE[BDB_Mariner]:FOR[zzzKerbalismDefault]:NEEDS[Bluedog_DB,FeatureScience]
{
    @DATA[experimentslist]
    {
        %experiments = [logmmImpacts , logIonTrap, bd_microwaveSpec, bd_IRradiometer, magnetometer]
    }
}

@CONTRACT_TYPE[BDB_GeoStudy]:FOR[zzzKerbalismDefault]:NEEDS[Bluedog_DB,FeatureScience]
{
    @DATA[experimentslist]
    {
        %experiments = [bd_cosmicRay , logIonTrap , bd_gammaRay, magnetometer , bd_massSpec]
    }
}

@CONTRACT_TYPE[BDB_SolarStudy]:FOR[zzzKerbalismDefault]:NEEDS[Bluedog_DB,FeatureScience]
{
    @DATA[experimentslist]
    {
        %experiments = [bd_oso , bd_solarWind , kerbalism_LITE]
    }
}

@CONTRACT_TYPE[BDB_Ranger_Block2]:FOR[zzzKerbalismDefault]:NEEDS[Bluedog_DB,FeatureScience]
{
    // Rough lander may not have enough battery to transmit the seismicScan. Have it transmit telemetry instead.
    @PARAMETER[CollectScienceB]
    {
        @experiment = kerbalism_Telemetry
        @title = Transmit telemetry from the surface of @targetBody after successful landing
    }

    // Gamma experiment will take too long to complete on impact trajectory
    @DATA[experimentslist]
    {
        %experiments = [bd_camera, bd_radarAltimeter]
    }
}

@CONTRACT_TYPE[BDB_Ranger]:FOR[zzzKerbalismDefault]:NEEDS[Bluedog_DB,FeatureScience]
{
    // Add bd_camera as an option for more flexibility
    @DATA[experimentslist]
    {
        %experiments = [bd_ionElec, bd_UVspec, logIonTrap, bd_camera]
    }
}

