@PART[bluedog_Strawman_Harvester]:NEEDS[Bluedog_DB,FeatureScience]:FOR[zzzKerbalismDefault]
{
  @MODULE[Experiment]:HAS[#experiment_id[bd_ELINT]]
  {
    data_rate *= 2 // Twice as fast data rate as Thresher alone
    requires = Part:bluedog_Strawman_Reaper,Part:bluedog_Strawman_Thresher,AdministrationLevelMin:3,TrackingStationLevelMin:3
  }
}

// use our own geiger counter experiment definition
!EXPERIMENT_DEFINITION:HAS[#id[bd_GeigerCounter]]:NEEDS[Bluedog_DB,FeatureScience] {}

// Remove the geigerCounter experiment added to all probe cores before replacing the BDB geiger counter experiment
@PART[bluedog_*]:HAS[@MODULE[Experiment]:HAS[#experiment_id[geigerCounter]]]:NEEDS[Bluedog_DB,FeatureScience]:FOR[zzzKerbalismDefault]
{
  -MODULE[Experiment]:HAS[#experiment_id[geigerCounter]] {}
  @MODULE[Configure]:HAS[#title[Unmanned?Experiments]]
  {
    -SETUP[Geiger?Counter] {}
  }
}

@PART[bluedog_*]:HAS[@MODULE[*ModuleScience*]:HAS[#experimentID[bd_GeigerCounter]]]:NEEDS[Bluedog_DB,FeatureScience]:FOR[zzzKerbalismDefault]
{
  MODULE
  {
    name = Experiment
    experiment_id = geigerCounter
  }

  MODULE
  {
    name = Sensor
    type = radiation
    pin = needle
  }
}

//  Changes experimentlist to accomodate change in experiment_id
// TODO also lunar orbiter
@CONTRACT_TYPE[BDB_Gemini]:NEEDS[Bluedog_DB,FeatureScience]:FOR[zzzKerbalismDefault]
{
  @DATA[experimentslist]
  {
    %experiments = [logmmImpacts, geigerCounter]
  }
}

@EXPERIMENT_DEFINITION:HAS[#id[bd_atm]]:NEEDS[Bluedog_DB,FeatureScience]:FOR[zzzKerbalismDefault]
{
  @baseValue = #$@KERBALISM_EXPERIMENT_VALUES/BDB/bd_atm/value$
  @dataScale = #$@KERBALISM_EXPERIMENT_VALUES/BDB/bd_atm/size$
  @dataScale /= #$baseValue$
  
  KERBALISM_EXPERIMENT
  {
    Situation = InSpaceLow@VirtualBiomes
    Situation = InSpaceHigh@VirtualBiomes
    VirtualBiome = NoBiome
    VirtualBiome = Storm
    SampleMass = 0.01 // 10kg of film
  }

}

@PART[*]:HAS[@MODULE[*ModuleScience*]:HAS[#experimentID[bd_atm]]]:NEEDS[Bluedog_DB,FeatureScience]:FOR[zzzKerbalismDefault]
{
  MODULE
  {
    name = Experiment
    experiment_id = bd_atm
    experiment_desc = Crew operated solar photography experiments.
    data_rate = #$@KERBALISM_EXPERIMENT_VALUES/BDB/bd_atm/size$
    @data_rate /= #$@KERBALISM_EXPERIMENT_VALUES/BDB/bd_atm/duration$
    ec_rate = #$@KERBALISM_EXPERIMENT_VALUES/BDB/bd_atm/ec_rate$
    allow_shrouded = False
    requires = Sunlight,CrewMin:2
    crew_prepare = Engineer@1
    crew_operate = Scientist@2
    sample_amount = 4 // Pack extra film, just in case
  }
}

