@PART[bluedog_Strawman_Harvester]:FOR[zzzKerbalismDefault]:NEEDS[Bluedog_DB,FeatureScience]
{
    @MODULE[Experiment]:HAS[#experiment_id[bd_ELINT]]
    {
        @data_rate *= 2 // Twice as fast data rate as Thresher alone
        requires = Part:bluedog_Strawman_Reaper,Part:bluedog_Strawman_Thresher,AdministrationLevelMin:3,TrackingStationLevelMin:3
    }
}

// use our own geiger counter experiment definition
!EXPERIMENT_DEFINITION:HAS[#id[bd_GeigerCounter]]:NEEDS[Bluedog_DB,FeatureScience] {}

// Remove the geigerCounter experiment added to all probe cores before replacing the BDB geiger counter experiment
@PART[bluedog_*]:HAS[@MODULE[Experiment]:HAS[#experiment_id[geigerCounter]]]:FOR[KerbalismDefault]:NEEDS[Bluedog_DB,FeatureScience]
{
    -MODULE[Experiment]:HAS[#experiment_id[geigerCounter]] {}
    @MODULE[Configure]:HAS[#title[Unmanned?Experiments]]
    {
        -SETUP[Geiger?Counter] {}
    }
}

@PART[bluedog_*]:HAS[@MODULE[*ModuleScience*]:HAS[#experimentID[bd_GeigerCounter]]]:FOR[KerbalismDefault]:NEEDS[Bluedog_DB,FeatureScience]
{
    MODULE
    {
        name = Experiment
        experiment_id = geigerCounter
    }

    MODULE
    {
        name = Sensor
        type = radiation
        pin = needle
    }
}

@EXPERIMENT_DEFINITION:HAS[#id[bd_atm]]:FOR[zzzKerbalismDefault]:NEEDS[Bluedog_DB,FeatureScience]
