}

@PART[bluedog_ALSEP_LRRR]:FOR[zzzKerbalismDefault]:NEEDS[Bluedog_DB,FeatureScience]
{
    MODULE
    {
        name = HardDrive
        dataCapacity = #$@KERBALISM_EXPERIMENT_VALUES/BDB/bd_ALSEP_LRRR/size$
        sampleCapacity = 0
        // experiment_id doesn't seem to work for stock science modules
    }
}

