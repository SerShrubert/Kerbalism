// Since all kerbalism experiments are 100%, there isn't much benefit to these parts over the ALSD which is surface deployable. The LM Drill Experiment looks cool at least. Stock experiment module would be preferable, but the ALSD wasn't handling surface biomes correctly.
@PART[bluedog_LM_DrillExperiment,bluedog_LTV]:HAS[@MODULE[*ModuleScience*]:HAS[#experimentID[bd_drill]]]:FOR[zzzKerbalismDefault]:NEEDS[Bluedog_DB,FeatureScience]
{
    MODULE
    {
        name = Experiment
        experiment_id = bd_drill
        data_rate = #$@KERBALISM_EXPERIMENT_VALUES/BDB/bd_drill/size$
        @data_rate /= #$@KERBALISM_EXPERIMENT_VALUES/BDB/bd_drill/duration$
        ec_rate = #$@KERBALISM_EXPERIMENT_VALUES/BDB/bd_drill/ec_rate$
        sample_collecting = true
        crew_reset = true
        crew_operate = true
    }
}

// Produces a sample. Good luck retrieving it
@PART[bluedog_voyagerMarsLander_drill]:HAS[@MODULE[*ModuleScience*]:HAS[#experimentID[bd_drill]]]:FOR[zzzKerbalismDefault]:NEEDS[Bluedog_DB,FeatureScience]
{
    MODULE
    {
        name = Experiment
        experiment_id = bd_drill
        data_rate = #$@KERBALISM_EXPERIMENT_VALUES/BDB/bd_drill/size$
        @data_rate /= #$@KERBALISM_EXPERIMENT_VALUES/BDB/bd_drill/duration$
        ec_rate = #$@KERBALISM_EXPERIMENT_VALUES/BDB/bd_drill/ec_rate$
        sample_collecting = true
        crew_reset = true
    }

    MODULE
    {
        name = HardDrive
        dataCapacity = 0
        sampleCapacity = 1
        experiment_id = bd_drill
    }
}

// Surface deployed drill. Uses Kerbalism science module, but with no ec drain.
@PART[bluedog_ALSEP_ALSD]:HAS[@MODULE[*ModuleScience*]:HAS[#experimentID[bd_drill]]]:FOR[zzzKerbalismDefault]:NEEDS[Bluedog_DB,FeatureScience]
{
    MODULE
    {
        name = Experiment
        experiment_id = bd_drill
        data_rate = #$@KERBALISM_EXPERIMENT_VALUES/BDB/bd_drill/size$
        @data_rate /= #$@KERBALISM_EXPERIMENT_VALUES/BDB/bd_drill/duration$
        ec_rate = 0
        sample_collecting = true
        crew_reset = true
    }

    MODULE
    {
        name = HardDrive
        dataCapacity = 0
        sampleCapacity = 1
    }

    // Make this part a probe core so the Kerbalism experiment can actually run
    CrewCapacity = 0
    vesselType = DeployedSciencePart
    MODULE
    {
        name = ModuleCommand
        minimumCrew = 0
    }
}



// Copy the bd_SIGINT experiment to differentiate SOLRAD/POPPY and Strawman satellites
+EXPERIMENT_DEFINITION:HAS[#id[bd_SIGINT]]:FOR[zzzKerbalismDefault]:NEEDS[Bluedog_DB,FeatureScience]
{
    @id = bd_ELINT
    @title = ELINT Scan
    @baseValue = #$@KERBALISM_EXPERIMENT_VALUES/BDB/bd_ELINT/value$
    @dataScale = #$@KERBALISM_EXPERIMENT_VALUES/BDB/bd_ELINT/size$
    @dataScale /= #$baseValue$

    KERBALISM_EXPERIMENT
    {
        BodyAllowed = HomeBody
        Situation = InSpaceLow@Biomes
        Situation = InSpaceHigh@Biomes
    }
}

@PART[bluedog_Strawman_Harvester,bluedog_Strawman_Thresher]:HAS[@MODULE[*ModuleScience*]:HAS[#experimentID[bd_SIGINT]]]:FOR[zzzKerbalismDefault]:NEEDS[Bluedog_DB,FeatureScience]
{
    MODULE
    {
        name = Experiment
        experiment_id = bd_ELINT
        experiment_desc = Electronic Intelligence Scan
        data_rate = #$@KERBALISM_EXPERIMENT_VALUES/BDB/bd_ELINT/size$
        @data_rate /= #$@KERBALISM_EXPERIMENT_VALUES/BDB/bd_ELINT/duration$
        ec_rate = #$@KERBALISM_EXPERIMENT_VALUES/BDB/bd_ELINT/ec_rate$
