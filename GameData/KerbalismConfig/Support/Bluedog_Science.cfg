{
  !MODULE[Experiment]:HAS[#experiment_id[kerbalism_LITE]] {}
  !MODULE[Experiment]:HAS[#experiment_id[kerbalism_MITE]] {}
  !MODULE[Experiment]:HAS[#experiment_id[kerbalism_SITE]] {}

  @MODULE[Configure]:HAS[#title[Unmanned?Experiments]]
  {
    !SETUP[LITE] {}
    !SETUP[MITE] {}
    !SETUP[SITE] {}
  }
}

