@KERBALISM_EXPERIMENT_VALUES:NEEDS[Bluedog_DB,FeatureScience]
{
  %BDB
  {
    bd_surveillance // Gambit, Hexagon, MOL
    {
      size = 1
      value = 15 // Buff 10 -> 15. At 24 hours per biome and requiring sample return, many biomes will take a long time to complete
      duration = 86400 // 24 hours
      ec_rate = 0.1
    }
    bd_atm // Skylab, Apollo
    {
      size = 1 // 1 sample slot
      value = 30
      duration = 453600 // 21 days
      ec_rate = 0.5
    }
    bd_oso // OSO, Skylab, Apollo, X15
    {
      size = 8000
      value = 10
      duration = 453600 // 21 days
      ec_rate = 0.3
    }
    bd_rpws // Helios, OGO, RAE, Skylab
    {
      size = 1800
      value = 9
      duration = 648000 // 30 days
      ec_rate = 0.3
    }
    logmmImpacts // Gemini, Mariner, Clementine, Helios, Pioneer, Voyager Mars, X15
    {
      size = 21
      value = 6
      duration = 21600
      ec_rate = 0.001 // Low power, low bitrate experiment
    }
    logIonTrap // Mariner, Pioneer, Ranger, OGO
    {
      size = 2
      value = 6
      duration = 7200 // Short enough to capture solar storms, and collect data on planetary flybys
      ec_rate = 0.0025 // Real power usage: 2.5W including data processing on Mariner 2
    }
    bd_massSpec // Apollo, Gemini, Helios, OGO, Pioneer, Voyager Mars, Skylab
    {
      size = 5200
      value = 8
      duration = 7200 // hours
      ec_rate = 0.44
    }
    bd_camera // Apollo, Gemini Lunar Recon, Ranger, Mariner, Pioneer, Viking, Voyager Mars
    {
      size = 2
      value = 4
      duration = 60 // 1 minute, to allow experiment to run while on impact course or flyby
      ec_rate = 0.1 // Real power usage: 6.5W on Mariner 4 and Apollo 11. Use more power to compensate for the shorter experiment duration
    }
    bd_IRspec // Clementine, Nimbus, Voyager Mars, Skylab, X15
    {
      size = 144 // 10kb/s
      value = 6
      duration = 14400 // 4 hours
      ec_rate = 0.2
    }
    bd_hydrometer // Voyager Mars, Venus flyby probe
    {
      size = 751
      value = 9
      duration = 50400 // 14 hours
      ec_rate = 0.16
    }
    bd_mapping // Corona, Hexagon, Apollo
    {
      value = 3
      size = 1      
      duration = 60
      ec_rate = 0.05
    }
    bd_Photometer // OSO, Helios, Pioneer, Vanguard, X15
    {
      value = 2
      size = 0.5      
      duration = 300
      ec_rate = 0.001
    }
    bd_weather // Nimbus, TIROS
    {
      value = 5
      duration = 216000 // 60 hours
      size = 2000
      ec_rate = 0.75
    }
    bd_microwaveSpec // Nimbus, Mariner, Apollo, Skylab, OV1
    {
      value = 4
      duration = 43200 // 12 hours
      size = 200
      ec_rate = 0.2
    }
    bd_IRradiometer // Nimbus, voyager Mars Orbiter, Mariner, Viking, Pioneer, OV1
    {
      value = 3
      size = 36      
      duration = 3600 // 1 hours
      ec_rate = 0.01
    }
    bd_ionElec // Ranger, Explorer, Mariner, OGO, Injun, LOFTI
    {
      value = 5
      duration = 3600 // 1 hours
      size = 35
      ec_rate = 0.005
    }
    bd_UVspec // Ranger, Mariner, Clementine, Apollo, OAO, OV1, Pioneer, Voyager Mars, Skylab, X15
    {
      value = 5
      duration = 3600 // 1 hour
      size = 18 // 5 kB/s
      ec_rate = 0.05 // Placeholder default
    }
    bd_XRayDiffract // Surveyor Alpha Spectrometer
    {
      value = 12
      duration = 43200 // 12 hours. Real experiment ran for 46 hours from 3 samples
      size = 210 // 5 kB/s
      ec_rate = 0.0025 // Real power usage: 1.3W on Surveyor
    }
    bd_soilScoop // Surveyor Scoop
    {
      value = 5
      duration = 60
      size = 10 // 10MB
      ec_rate = 0.1
    }
    bd_UVscope // OAO
    {
      value = 40
      duration = 15552000 // 4320 hours. Incentivise launching OAO 1, 2 and 3
      size = 15187 // 1kB/s
      ec_rate = 1 // Real power usage: 30W for scientific instrument itself, 300W for whole system. The OAO solar panels are overpowered, so consume more power to compensate
    }
    bd_TrappedRadiation // Pioneer, Mariner, Pegasus
    {
      value = 8
      duration = 3600 // 1 hour, short enough to measure a planet's magnetic field on a flyby
      size = 18 // 5 kB/s
      ec_rate = 0.0025
    }
    bd_TelescopeObservation // Lunar shelter telescope
    {
      value = 15
      duration = 60
      size = 1 // 1 "sample"
      ec_rate = 0.01
    }
    bd_solarWind // Mariner, OSO, Pioneer, Voyager Mars, Skylab
    {
      value = 6
      duration = 1296000 // 360 hours
      size = 1265 // 1 kB/s Long but low bitrate experiment
      ec_rate = 0.0025
    }
    bd_SoilMoisture // Copied from dmSoilMoisture
    {
      size = 81920
      value = 14
      duration = 1944000 // 90 days
      ec_rate = 1.5
    }
    bd_Scatterometer // Skylab
    {
      value = 10
      duration = 36000 // 10 hours
      size = 3600
      ec_rate = 0.1
    }
    bd_radarAltimeter // Ranger, Clementine, Skylab
    {
      value = 2
      duration = 60 // Short enough for ranger
      size = 1
      ec_rate = 0.1
    }
    bd_poke // Deployed experiment
    {
      value = 4
      duration = 20 // Literally just penetrating the ground
      size = 0.01 // 10 kB
      ec_rate = 0 // Deployed experiment without electric charge
    }
    bd_pegasus // Pegasus
    {
      value = 50
      duration = 15768000 // 4,380 hours. Real Pegasus experiment operated for 3 years
      size = 153984 // 10 kB/s
      ec_rate = 0.5
    }
    bd_orbitalScope // Skylab EOSS and Venus Flyby
    {
      value = 15
      duration = 43200 // 12 hours
      size = 843 // 20 kB/s
      ec_rate = 0.5
    }
    bd_multiSpec // Pioneer H, Skylab
    {
      value = 8
      duration = 3600 // 1 hour
      size = 36
      ec_rate = 0.05
    }
    bd_kepler // Kepler
    {
      value = 250
      duration = 78840000 // 10 (stock scale) years
      size = 42345703 // 550kB/s actual data link rate
      ec_rate = 1
    }
    bd_gammaRay // OGO, Ranger Block 2, Explorer 11
    {
      value = 3 // Nerf 6 -> 3
      duration = 1800 // 30 minutes, still too long for Ranger Block 2 contract
      size = 10
      ec_rate = 0.05
    }
    bd_XrayImaging // OAO, Voyager Mars Orbiter, WRESAT, Skylab
    {
      value = 6
      duration = 7200 // 2 hours
      size = 7
      ec_rate = 0.01 // 10W
    }
    bd_cosmicRay // OGO, OV1, Pioneer, Voyager Mars Orbiter
    {
      value = 10 // Buff 6 -> 10 for longer duration
      duration = 1296000 // 60 (stock scale) days
      size = 1265 // 1 kB/s
      ec_rate = 0.05
    }
    bd_SiteSurvey // Surveyor
    {
      value = 6
      duration = 21600 // 6 hours
      size = 84 // About 4 KB/s
      ec_rate = 0.066 // Real power usage: 30W. About 1/3 of the total power provided by the solar panel on Surveyor. In game solar panel is 800W, but only 25% exposure at solar noon
    }
    bd_SIGINT // SOLRAD/POPPY
    {
      value = 4 // Nerfed version for the standalone satellites, as they are available very early
      duration = 43200 // 12 Hours
      size = 42 // 1KB/s
      ec_rate = 0.005
    }
    bd_ELINT // Strawman
    {
      value = 20 // 30 -> 20, but also includes space high biomes
      duration = 432000 // 120 hours
      size = 31640 // 75KB/s
      ec_rate = 0.5
    }
    bd_drill // Apollo, Voyager Mars Lander
    {
      value = 8
      duration = 60
      size = 1
      ec_rate = 0
    }
    bd_bioexp // Biosatellite 1/2
    {
      value = 15
      size = 1
      duration = 302400 // 84 hours
      ec_rate = 0.005 // Biosatellite doesn't have any power generation, so keep ec_rate low
    }
    bd_FOEP // Orbiting Frog Otolith
    {
      value = 15
      size = 4
      duration = 129600 // 36 hours
      ec_rate = 0.005 // OFO doesn't have any power generation, so keep ec_rate low
    }
    bd_ALSEP_LRRR // Apollo deployed science
    {
      value = 4
      size = 1
      duration = 10
      ec_rate = 0
    }
    bd_ALSEP_SWC // Apollo deployed science
    {
      value = 20
      size = 1
      duration = 4320 // 1.2 Hours
      ec_rate = 0
    }
    
  }
}

