// bd_GooLab didn't have a definition. Use mysteryGoo for now
@PART[bluedog_*]:HAS[@MODULE[*ModuleScience*]:HAS[#experimentID[bd_GooLab]]]:NEEDS[Bluedog_DB,FeatureScience]:FOR[zzzKerbalismDefault]
{
    MODULE
    {
      name = Experiment
      experiment_id = mysteryGoo
    }
}

@EXPERIMENT_DEFINITION:HAS[#id[bd_ALSEP_SWC]]:NEEDS[Bluedog_DB,FeatureScience]:FOR[zzzKerbalismDefault]
{
  @baseValue = #$@KERBALISM_EXPERIMENT_VALUES/BDB/bd_ALSEP_SWC/value$
  @dataScale = #$@KERBALISM_EXPERIMENT_VALUES/BDB/bd_ALSEP_SWC/size$
  @dataScale /= #$baseValue$

  KERBALISM_EXPERIMENT
  {
    BodyNotAllowed = Atmospheric
    Situation = SrfLanded
    SampleMass = 0.001
  }
}

@PART[bluedog_ALSEP_LRRR]:NEEDS[Bluedog_DB,FeatureScience]:FOR[zzzKerbalismDefault]
{
    MODULE
    {
      name = Experiment
      experiment_id = bd_ALSEP_SWC
      experiment_desc = Analysis of solar wind particles captured from a surface deployed experiment
      data_rate = #$@KERBALISM_EXPERIMENT_VALUES/BDB/bd_ALSEP_SWC/size$
      @data_rate /= #$@KERBALISM_EXPERIMENT_VALUES/BDB/bd_ALSEP_SWC/duration$
      ec_rate = #$@KERBALISM_EXPERIMENT_VALUES/BDB/bd_ALSEP_SWC/ec_rate$
      sample_amount = 1
      crew_prepare = @1
      requires = Sunlight
    }

    // Just enough capacity for 1 Experiment
    MODULE[HardDrive]
    {
        sampleCapacity = 1
        maxSampleCapacityFactor = 1
        experiment_id = bd_ALSEP_SWC
    }
}

@EXPERIMENT_DEFINITION:HAS[#id[bd_ALSEP_LRRR]]:NEEDS[Bluedog_DB,FeatureScience]:FOR[zzzKerbalismDefault]
{
  @baseValue = #$@KERBALISM_EXPERIMENT_VALUES/BDB/bd_ALSEP_LRRR/value$
  @dataScale = #$@KERBALISM_EXPERIMENT_VALUES/BDB/bd_ALSEP_LRRR/size$
  @dataScale /= #$baseValue$

  KERBALISM_EXPERIMENT
  {
    BodyNotAllowed = Atmospheric
    Situation = SrfLanded@Biomes
  }
}

@PART[bluedog_ALSEP_LRRR]:NEEDS[Bluedog_DB,FeatureScience]:FOR[zzzKerbalismDefault]
{
    MODULE
    {
      name = Experiment
      experiment_id = bd_ALSEP_LRRR
      experiment_desc = Surface deployed retro reflector
      data_rate = #$@KERBALISM_EXPERIMENT_VALUES/BDB/bd_ALSEP_LRRR/size$
      @data_rate /= #$@KERBALISM_EXPERIMENT_VALUES/BDB/bd_ALSEP_LRRR/duration$
      ec_rate = #$@KERBALISM_EXPERIMENT_VALUES/BDB/bd_ALSEP_LRRR/ec_rate$
      crew_reset = @2
      crew_prepare = True
    }

    // Just enough capacity for 1 "Experiment"
    MODULE[HardDrive]
    {
        dataCapacity = 1
