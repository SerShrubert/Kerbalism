// ============================================================================
// Sterling Systems non-SystemHeat and FFT dynamic radiation
// ============================================================================

// Thrust-scaled engines (no SH ProcessController path)
@PART[strl-eng-375-ccgc|strl-eng-375-ocgc|strl-eng-1000-bcam|strl-eng-*-suleu|strl-eng-*gc]:HAS[@MODULE[Emitter]:HAS[#radiation[>0]],@MODULE[ModuleEnginesFX],!MODULE[ProcessControllerSystemHeat]]:NEEDS[Kerbalism,FeatureRadiation,SterlingSystems]:LAST[KerbalismBridge30Radiation]
{
	MODULE
	{
		name = DynamicRadiationController
		powerModuleName = ModuleEnginesFX
		powerActiveMode = thrust
		minEmissionPercent = #$@KERBALISM_DYNAMIC_RADIATION_SETTINGS/Engine_MinEmissionPercent$
		emissionDecayRate = #$@KERBALISM_DYNAMIC_RADIATION_SETTINGS/Engine_EmissionDecayRate$
	}
}

@PART[strl-eng-375-mcf|strl-eng-*-icf]:HAS[@MODULE[Emitter]:HAS[#radiation[>0]],@MODULE[FFTFusionEngineKerbalismUpdater]]:NEEDS[Kerbalism,FeatureRadiation,SterlingSystems,FarFutureTechnologies]:LAST[KerbalismBridge30Radiation]
{
	MODULE
	{
		name = DynamicRadiationController
		powerModuleName = ModuleFusionEngine
		powerModuleId = #$/MODULE[FFTFusionEngineKerbalismUpdater]/engineModuleID$
		minEmissionPercent = #$@KERBALISM_DYNAMIC_RADIATION_SETTINGS/Engine_MinEmissionPercent$
		emissionDecayRate = #$@KERBALISM_DYNAMIC_RADIATION_SETTINGS/Engine_EmissionDecayRate$
	}
}

// MSR / PBR reactors via ProcessController (SH Extra renames to ProcessControllerSystemHeat)
@PART[strl-rctrms-*|strl-rctrpb-*]:HAS[@MODULE[Emitter]:HAS[#radiation[>0]],@MODULE[ProcessController],!MODULE[ProcessControllerSystemHeat]]:NEEDS[Kerbalism,FeatureRadiation,SterlingSystems]:LAST[KerbalismBridge30Radiation]
{
	MODULE
	{
		name = DynamicRadiationController
		powerModuleName = ProcessController
		powerActiveMode = any_running
		minEmissionPercent = #$@KERBALISM_DYNAMIC_RADIATION_SETTINGS/Reactor_MinEmissionPercent$
		emissionDecayRate = #$@KERBALISM_DYNAMIC_RADIATION_SETTINGS/Reactor_EmissionDecayRate$
	}
}
