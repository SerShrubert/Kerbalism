// MCF/ICF with FFT installed
@PART[strl-eng-375-mcf|strl-eng-*-icf]:HAS[@MODULE[ModuleFusionEngine]:HAS[#ModuleID[*]],!MODULE[FFTFusionEngineKerbalismUpdater]]:NEEDS[Kerbalism,FarFutureTechnologies,SterlingSystems]:LAST[KerbalismBridge00Integration]
{
	MODULE
	{
		name = FFTFusionEngineKerbalismUpdater
		engineModuleID = #$../MODULE[ModuleFusionEngine]:HAS[#ModuleID[*]],0/ModuleID$
	}

	!MODULE[ProcessController],* {}
	!MODULE[PlannerController],* {}
	MODULE
	{
		name = PlannerController
		plannerId = fusionEngine
		title = #KERBALISM_Brokers_FusionEngine
		considered = true
	}
}
