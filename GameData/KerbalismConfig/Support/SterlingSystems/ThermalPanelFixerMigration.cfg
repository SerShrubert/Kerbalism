// ============================================================================
// Legacy third-party solar panel module migration (not SystemHeat-dependent)
// ============================================================================
// Third-party renames

@PART[*]:HAS[@MODULE[ThermalPanelFixer]]:NEEDS[Kerbalism]:LAST[KerbalismBridge90Cleanup]
{
	@MODULE[ThermalPanelFixer],*
	{
		@name = SolarPanelFixer
	}
}

@PART[*]:HAS[@MODULE[Reliability]:HAS[#type[ThermalPanelFixer]]]:NEEDS[Kerbalism,FeatureReliability]:LAST[KerbalismBridge90Cleanup]
{
	@MODULE[Reliability]:HAS[#type[ThermalPanelFixer]]
	{
		@type = SolarPanelFixer
	}
}

// B9PartSwitch IDENTIFIER renames

@PART[*]:HAS[@MODULE[ModuleB9PartSwitch]]:NEEDS[Kerbalism,B9PartSwitch]:LAST[KerbalismBridge90Cleanup]
{
	@MODULE[ModuleB9PartSwitch],*
	{
		@SUBTYPE,*
		{
			@MODULE,*
			{
				@IDENTIFIER:HAS[#name[ThermalPanelFixer]]
				{
					@name = SolarPanelFixer
				}
			}
		}
	}
}
