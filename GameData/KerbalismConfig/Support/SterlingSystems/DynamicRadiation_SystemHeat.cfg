// ============================================================================
// DynamicRadiation.cfg
// Bridge integration support merged from KerbalismBridge.
// ============================================================================


// ============================================================================
// KerbalismBridge integration: SterlingSystemsReactors.cfg
// ============================================================================
// Dynamic radiation for Sterling reactors (main package covers plain ProcessController)
@PART[strl-rctrms-*|strl-rctrpb-*]:HAS[@MODULE[Emitter]:HAS[#radiation[>0]],@MODULE[ProcessControllerSystemHeat],!MODULE[DynamicRadiationController]]:NEEDS[Kerbalism,FeatureRadiation,SterlingSystems]:LAST[KerbalismBridge30Radiation]
{
	MODULE
	{
		name = DynamicRadiationController
		powerModuleName = ProcessControllerSystemHeat
		powerActiveMode = any_running
		minEmissionPercent = #$@KERBALISM_DYNAMIC_RADIATION_SETTINGS/Reactor_MinEmissionPercent$
		emissionDecayRate = #$@KERBALISM_DYNAMIC_RADIATION_SETTINGS/Reactor_EmissionDecayRate$
	}
}


// ============================================================================
// KerbalismBridge integration: SterlingSystemsEngines.cfg
// ============================================================================
// Dynamic radiation for Sterling engines (main package covers ModuleEnginesFX without SH)

@PART[strl-eng-*-suleu]:HAS[@MODULE[Emitter]:HAS[#radiation[>0]],@MODULE[ProcessControllerSystemHeat]:HAS[#resource[_SULEU]],!MODULE[DynamicRadiationController]]:NEEDS[Kerbalism,FeatureRadiation,SterlingSystems]:LAST[KerbalismBridge30Radiation]
{
	MODULE
	{
		name = DynamicRadiationController
		powerModuleName = ProcessControllerSystemHeat
		powerModuleId = _SULEU
		powerActiveMode = running
		minEmissionPercent = #$@KERBALISM_DYNAMIC_RADIATION_SETTINGS/Reactor_MinEmissionPercent$
		emissionDecayRate = #$@KERBALISM_DYNAMIC_RADIATION_SETTINGS/Reactor_EmissionDecayRate$
	}
}
