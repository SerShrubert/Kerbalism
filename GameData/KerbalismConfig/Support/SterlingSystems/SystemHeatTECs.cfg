// Delta Electro TECs -> ProcessController + SystemHeat.

@PART[strl-tectrb-*]:NEEDS[CommunityResourcePack,Kerbalism,SystemHeat,SterlingSystems]
{
	@tags ^= :$: _kerbalism

	!MODULE[ModuleSystemHeatConverter],* {}
	!MODULE[ModuleResourceConverter],* {}
	!MODULE[SystemHeatConverterKerbalism],* {}
	!MODULE[SystemHeatConverterKerbalismUpdater],* {}
	!MODULE[PlannerController],* {}
	!MODULE[ModuleOverheatDisplay] {}
	!MODULE[ModuleCoreHeat] {}
	!MODULE[Reliability]:HAS[#type[ModuleResourceConverter]],* {}

	MODULE
	{
		name = ModuleSystemHeat
		volume = #$/mass$
		moduleID = isru
		iconName = Icon_Gears
	}

	MODULE
	{
		name = ProcessController
		resource = _TEC
		title = #LOC_strl_converter_thermoelectric
		capacity = #$/refPower$
	}
}

// Sterling Power_TECs re-adds stock ModuleResourceConverter / ModuleCoreHeat after
// Kerbalism conversion. Strip them again after Sterling finishes.
@PART[strl-tectrb-*]:HAS[@MODULE[ProcessController]|@MODULE[ProcessControllerSystemHeat]]:NEEDS[Kerbalism,SterlingSystems]:AFTER[SterlingSystems]
{
	!MODULE[ModuleSystemHeatConverter],* {}
	!MODULE[ModuleResourceConverter],* {}
	!MODULE[ModuleCoreHeat],* {}
	!MODULE[ModuleOverheatDisplay],* {}
	!MODULE[SystemHeatConverterKerbalism],* {}
	!MODULE[SystemHeatConverterKerbalismUpdater],* {}
	!MODULE[PlannerController]:HAS[#plannerId[converter]],* {}
	!MODULE[Reliability]:HAS[#type[ModuleResourceConverter]],* {}
}
