// Aquaculture uses a distinct Waste/O2/CO2 process. Its legacy ratios are retained,
// while all biological throughput rates are scaled with the 18x greenhouse balance pass.

@PART[sspx-aquaculture-375-1]:NEEDS[StationPartsExpansionRedux,ProfileDefault]:AFTER[KerbalismDefault]
{
	MODULE
	{
		name = Greenhouse

		crop_resource = Food								// resource produced continuously
		// Four times the stock greenhouse Food throughput.
		// See https://forum.kerbalspaceprogram.com/index.php?/topic/172400-131145-kerbalism-v180/&page=32&tab=comments#comment-3446891 for details.

		// Aquaculture module; rates scaled 18x with stock greenhouse balance pass (#1073)
		// produces Food for ~37.8 Kerbals at continuous rates; co2/o2/waste ratios kept relative to legacy design
		// somewhat higher food per ammonia ratio than traditional greenhouses

		crop_size = 1056.7566						// with crop_rate, gives 4x stock continuous Food throughput
		crop_rate = 0.0000004347
		ec_rate = 20							// 8x"kerbalism-greenhouse" bc of more expensive pumping, filtration, and temp regulation needs
		light_tolerance = 400.0						// minimum lighting flux required for production, in W/m^2
		pressure_tolerance = 0.1					// minimum pressure required for production, in sea level atmospheres
		radiation_tolerance = 0.000008333	 			// maximum radiation allowed for production in rad/s, considered after shielding is applied

		INPUT_RESOURCE
		{
			name = Waste
			rate = 0.000163888902					// 18x legacy aquaculture Waste input
		}

		INPUT_RESOURCE
		{
			name = Ammonia
			rate = 0.00172265625					// 1x"kerbalism-greenhouse"
		}

		INPUT_RESOURCE
		{
			name = Water
			rate = 0.00006890616					// 1.2x"kerbalism-greenhouse". 1x for Photosynthesis of algae. 0.2x for fish. Water is filtered so less water consumed. I dont know how much water fish actually drink, and dont pee out again
		}

//		INPUT_RESOURCE
//		{
//			name = Atmosphere					// Fish work on Atmosphere, if not enough Atmosphere exists then O2 is used, 
										// does this work? no it doesnt, and i dont know how to make it work. System seems to only work with WasteAtmosphere/CO2
//			rate = 0.001868699625					// 1.5x"kerbalism-greenhouse"
//		}

		INPUT_RESOURCE
		{
			name = Oxygen						// (in theory) If excess Atmosphere is present then it will be used in place of O2 injection
			rate = 0.023271276375					// 0.75x stock greenhouse configured Oxygen rate
		}

		// (again, in theory) Note. if there is a deficiency in the amount of Atmosphere needed then the missing amount of Atmosphere will be added to the
		// Oxygen input and Vies Versa if not enough Oxygen is present and there is extra Atmosphere.
		// If there is not enough resources then the fish will suffer.

		OUTPUT_RESOURCE
		{
			name = CarbonDioxide
			rate = 0.009343498078125				// 31.25% of stock greenhouse combined carbon input rate
		}
	}

	// Concider those nice IVA tanks and closets for increasing current resource capacity. I won't touch em for now.
	RESOURCE
	{
		name = Ammonia
		amount = 9792							// 2x"kerbalism-greenhouse"
		maxAmount = 9792
	}

	RESOURCE
	{
		name = Oxygen
		amount = 162000							// 2x"kerbalism-greenhouse"
		maxAmount = 162000
	}

	RESOURCE
	{
		name = CarbonDioxide
		amount = 0							// empty by default; capacity is 2x stock greenhouse
		maxAmount = 162000
	}

	// To support pressure control
	@MODULE[Configure]
	{
		@SETUP[Pressure?Control]
		{
		!RESOURCE[Nitrogen] {}
		}
	}

	RESOURCE
	{
		name = Nitrogen
		amount = 10000							// pressure-control buffer; unchanged by throughput scaling
		maxAmount = 10000
	}

	RESOURCE
	{
		name = Water
		amount = 396							// 2x"kerbalism-greenhouse"
		maxAmount = 396
	}
}
