// ============================================================================
// region Greenhouses
// ============================================================================
@PART[sspx-greenhouse-25-1]:NEEDS[StationPartsExpansionRedux,ProfileDefault]:AFTER[KerbalismDefault]
{
	MODULE
	{
		name = Greenhouse
		crop_resource = Food								// resource produced continuously
		// Twice as effective as kerbalism-greenhouse part. 
		// See https://forum.kerbalspaceprogram.com/index.php?/topic/172400-131145-kerbalism-v180/&page=32&tab=comments#comment-3446891 for details.

		// The legacy 18-section sizing is retained; crop_size * crop_rate gives 2x stock continuous Food throughput.
		crop_size = 55.125
		crop_rate = 0.00000416664
		ec_rate = 5												 // 2x"kerbalism-greenhouse"
		light_tolerance = 400.0						 // minimum lighting flux required for production, in W/m^2
		pressure_tolerance = 0.1						// minimum pressure required for production, in sea level atmospheres
		radiation_tolerance = 0.000008333	 // maximum radiation allowed for production in rad/s, considered after shielding is applied
		shutters = 25DoorsOpen							// animation to manipulate shutters
		animBackwards = True

		INPUT_RESOURCE
		{
			name = Ammonia
			rate = 0.0034453125							// 2x"kerbalism-greenhouse"
		}

		INPUT_RESOURCE
		{
			name = Water
			rate = 0.0001148436							 // 2x"kerbalism-greenhouse"
		}

		INPUT_RESOURCE
		{
			name = WasteAtmosphere						// Plants work on WasteAtmosphere and replace a scrubber, if not enough WasteAtmosphere exists then CO2 is used
			rate = 0.044848791							 // 2x"kerbalism-greenhouse"
		}

		INPUT_RESOURCE
		{
			name = CarbonDioxide							// Kerbals don't provide enough WasteAtmosphere for their required food production. If excess WasteAtmosphere is
																				// present then it will be used in place of CO2 injection
			rate = 0.0149495967							// 2x"kerbalism-greenhouse"
		}

		// Note. if there is a deficiency in the amount of WasteAtmosphere needed then the missing amount of WasteAtmosphere will be added to the
		// CarbonDioxide input and Vies Versa if not enough CarbonDioxide is present and there is extra WasteAtmosphere.
		// If there is not enough resources then the plants will suffer.

		OUTPUT_RESOURCE
		{
			name = Oxygen
			rate = 0.062056737							 // 2x stock greenhouse configured Oxygen rate
		}
	}

	RESOURCE
	{
		name = Ammonia
		amount = 9792												// 2x"kerbalism-greenhouse"
		maxAmount = 9792
	}

	RESOURCE
	{
		name = CarbonDioxide
		amount = 162000											 // 2x"kerbalism-greenhouse"
		maxAmount = 162000
	}

	// To support pressure control
	@MODULE[Configure]
	{
		@SETUP[Pressure?Control]
		{
			!RESOURCE[Nitrogen] {}
		}
	}

	RESOURCE
	{
		name = Nitrogen
		amount = 10000											// pressure-control buffer; unchanged by throughput scaling
		maxAmount = 10000
	}

	RESOURCE
	{
		name = Water
		amount = 396												 // 2x"kerbalism-greenhouse"
		maxAmount = 396
	}

	!MODULE[ModuleAnimateGeneric] {}			// Greenhouse handles animation
}

@PART[sspx-greenhouse-375-1]:NEEDS[StationPartsExpansionRedux,ProfileDefault]:AFTER[KerbalismDefault]
{
	MODULE
	{
		name = Greenhouse

		crop_resource = Food								// resource produced continuously
		// Twice as effective as kerbalism-greenhouse part. 
		// See https://forum.kerbalspaceprogram.com/index.php?/topic/172400-131145-kerbalism-v180/&page=32&tab=comments#comment-3446891 for details.

		// Combined rings provide 2x stock continuous Food throughput.
		crop_size = 992.25
		crop_rate = 0.00000023148
		ec_rate = 5												 // 2x"kerbalism-greenhouse"
		light_tolerance = 400.0						 // minimum lighting flux required for production, in W/m^2
		pressure_tolerance = 0.1						// minimum pressure required for production, in sea level atmospheres
		radiation_tolerance = 0.000008333	 // maximum radiation allowed for production in rad/s, considered after shielding is applied

		INPUT_RESOURCE
