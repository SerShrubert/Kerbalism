// Adapted for Kerbalism packaging (incompatible with upstream SystemHeat Extras).
// Ion engine patch
@PART[ionEngine]:NEEDS[Kerbalism,SystemHeat,NearFuturePropulsion]:FOR[KerbalismSystemHeatCompat]
{
  MODULE
  {
    name = ModuleSystemHeat
    volume = 0.15
    moduleID = engine
    iconName = Icon_Engine
  }


  MODULE
  {
    name = ModuleSystemHeatEngine
    // must be unique
    moduleID = engine
    // ModuleSystemHeat to link to
    systemHeatModuleID = engine

    engineModuleID = FissionFragment
    // in KW at peak output
    systemPower = 1.5

    // Nominal system output temperature
    systemOutletTemperature = 350

    // Valid system temperature range
    temperatureCurve
    {
        key = 0 1.0
        key = 350 1.0
        key = 500 0.0
    }
  }

}

// Ion engine patch, no NFP (less power)
