// ============================================================================
// Extra drill modes previously only on the SystemHeat FUR patch
// ============================================================================
@PART[Lynx_DrillRear]:HAS[@MODULE[Configure]:HAS[#configureId[Drill]]]:NEEDS[FelineUtilityRover,ProfileDefault,SystemHeat,!Pathfinder]:AFTER[KerbalismDefault]
{
	MODULE
	{
		name = Harvester
		title = #KERBALISM_BranchLoc_Ammonia_Excavation
		type = 0
		resource = Ammonia
		min_abundance = 0.02
		rate = 0.0025
		ec_rate = 1.0
		drill = ImpactTransform
		length = 1.08
	}

	@MODULE[Configure]:HAS[#configureId[Drill]]
	{
		SETUP
		{
			name = #KERBALISM_BranchLoc_Ammonia_Extraction
			desc = #KERBALISM_BranchLoc_Extract_Ammonia_from_the_surface

			MODULE
			{
				type = Harvester
				id_field = resource
				id_value = Ammonia
			}

			RESOURCE
			{
				name = Ammonia
				amount = 0
				maxAmount = 50
			}
		}
	}
}

