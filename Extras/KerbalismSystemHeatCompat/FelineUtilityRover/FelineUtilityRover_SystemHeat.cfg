// ============================================================================
// SystemHeat path: strip leftover stock / Kerbetrotter modules after conversion
// (generic SystemHeat.cfg process-stage patches upgrade Harvester -> HarvesterSystemHeat)
// ============================================================================
@PART[Lynx_DrillRear]:HAS[@MODULE[Configure]:HAS[#configureId[Drill]]]:NEEDS[FelineUtilityRover,SystemHeat,!Pathfinder]:FINAL
{
	!MODULE[ModuleKerbetrotterHarvesterSwitch],* {}
	!MODULE[ModuleResourceHarvester],* {}
	!MODULE[ModuleAsteroidDrill],* {}
	!MODULE[ModuleCometDrill],* {}
	!MODULE[ModuleOverheatDisplay],* {}
	!MODULE[ModuleCoreHeat],* {}
	!MODULE[SystemHeatHarvesterKerbalism],* {}
	!MODULE[ModuleSystemHeatHarvester],* {}
}


// ============================================================================
// SystemHeat path: strip leftover stock / Kerbetrotter modules after conversion
// (generic SystemHeat.cfg process-stage patches upgrade ProcessController -> ProcessControllerSystemHeat)
// ============================================================================
@PART[Lynx_ISRU]:HAS[@MODULE[Configure]:HAS[#configureId[ChemicalPlant]]]:NEEDS[FelineUtilityRover,SystemHeat]:FINAL
{
	!MODULE[ModuleKerbetrotterConverterSwitch],* {}
	!MODULE[ModuleResourceConverter],* {}
	!MODULE[ModuleOverheatDisplay],* {}
	!MODULE[ModuleCoreHeat],* {}
	!MODULE[ModuleSystemHeatConverter],* {}
	!MODULE[SystemHeatConverterKerbalism],* {}
	!MODULE[Reliability]:HAS[#type[ModuleResourceConverter]],* {}
}
