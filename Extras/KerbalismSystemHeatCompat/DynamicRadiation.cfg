// ============================================================================
// Dynamic radiation for SystemHeat fission reactors
// ============================================================================
// Dynamic radiation for fission reactors
@PART[*]:HAS[@MODULE[SystemHeatFissionReactorKerbalismUpdater]]:NEEDS[Kerbalism,FeatureRadiation]:LAST[KerbalismBridge30Radiation]
{
	MODULE
	{
		name = DynamicRadiationController
		powerModuleName = ModuleSystemHeatFissionReactor
		powerModuleId = #$/MODULE[SystemHeatFissionReactorKerbalismUpdater]/reactorModuleID$
		minEmissionPercent = #$@KERBALISM_DYNAMIC_RADIATION_SETTINGS/Reactor_MinEmissionPercent$
		emissionDecayRate = #$@KERBALISM_DYNAMIC_RADIATION_SETTINGS/Reactor_EmissionDecayRate$
	}
}


// ============================================================================
// Dynamic radiation for SystemHeat fission engines
// ============================================================================
// Dynamic radiation for EC fission engines
@PART[*]:HAS[@MODULE[SystemHeatFissionEngineKerbalismUpdater]]:NEEDS[Kerbalism,FeatureRadiation]:LAST[KerbalismBridge30Radiation]
{
	MODULE
	{
		name = DynamicRadiationController
		powerModuleName = ModuleSystemHeatFissionEngine
		powerModuleId = #$/MODULE[SystemHeatFissionEngineKerbalismUpdater]/engineModuleID$
		minEmissionPercent = #$@KERBALISM_DYNAMIC_RADIATION_SETTINGS/Engine_MinEmissionPercent$
		emissionDecayRate = #$@KERBALISM_DYNAMIC_RADIATION_SETTINGS/Engine_EmissionDecayRate$
	}
}
