// ============================================================================
// SystemHeat cryo tank Kerbalism updater
// ============================================================================
@PART[*]:HAS[@MODULE[ModuleSystemHeatCryoTank],!MODULE[SystemHeatCryoTankKerbalismUpdater]]:NEEDS[SystemHeat,CryoTanks,ProfileDefault]:LAST[KerbalismBridge00Integration]
{
	MODULE
	{
		name = SystemHeatCryoTankKerbalismUpdater
	}
}

@PART[*]:HAS[@MODULE[ModuleSystemHeatCryoTank]:HAS[#moduleID[*]],@MODULE[SystemHeatCryoTankKerbalismUpdater]]:NEEDS[SystemHeat,CryoTanks,ProfileDefault]:LAST[KerbalismBridge00Integration]
{
	@MODULE[SystemHeatCryoTankKerbalismUpdater]
	{
		%cryoModuleID = #$/MODULE[ModuleSystemHeatCryoTank]:HAS[#moduleID[*]],0/moduleID$
	}
}
