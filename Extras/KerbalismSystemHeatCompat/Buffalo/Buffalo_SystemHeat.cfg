// ============================================================================
// KerbalismBridge integration: Buffalo S.A.F.E.R. SystemHeat (NFE-style path)
// ============================================================================


@PART[WBI_SAFER]:HAS[@MODULE[ProcessControllerSystemHeat]:HAS[#resource[_Nukereactor]],!MODULE[ModuleSystemHeat]]:NEEDS[Kerbalism,SystemHeat,WildBlueIndustries]:LAST[KerbalismBridge20Process]
{
	MODULE
	{
		name = ModuleSystemHeat
		volume = 0.512
		moduleID = reactor
		iconName = Icon_Nuclear
	}
}

@PART[WBI_SAFER]:HAS[@MODULE[ProcessController]:HAS[#resource[_Nukereactor]]]:NEEDS[Kerbalism,SystemHeat,WildBlueIndustries,ProfileDefault]:LAST[KerbalismBridge00Integration]
{
	!MODULE[ModuleSystemHeatFissionReactor],* {}
	!MODULE[ModuleSystemHeatFissionFuelContainer],* {}

	@MODULE[ModuleActiveRadiator]
	{
		@name = ModuleSystemHeatRadiator
		moduleID = radiator
		systemHeatModuleID = reactor
		scalarModuleID = heat
		maxTempAnimation = 1200
		isCoreRadiator = true
		maxEnergyTransfer = 500
		overcoolFactor = 0.25
		temperatureCurve
		{
			key = 0 0
			key = 1000 500
		}
		convectiveArea = 0.5
	}

	@MODULE[ProcessController]:HAS[#resource[_Nukereactor]]
	{
		@name = ProcessControllerSystemHeat
		%valve_i = 1
		%systemHeatModuleID = reactor
		%systemOutletTemperature = 1000
		%systemPower = 500
		%CurrentPowerPercent = 100
		%MinimumThrottle = 25
		%meltdownTemperature = 1300
		%MaximumTemperature = 2000
		%CoreDamageRate = 0.008
		%CurrentSafetyOverride = 1000
		%allowManualShutdownTemperatureControl = true
		%AutoShutdown = true
		!coreDamageCurve {}
		coreDamageCurve
		{
			key = 1300 0.25
			key = 1650 0.75
			key = 2000 1.0
		}
		!systemEfficiency {}
		systemEfficiency
		{
			key = 0     0.0
			key = 1000  1.0
			key = 1300  0.0
		}
	}

	@MODULE[Reliability]:HAS[#type[ProcessController]]
	{
		@type = ProcessControllerSystemHeat
		@mtbf = 170000000
	}

	!MODULE[PlannerController],* {}
}

@PART[WBI_SAFER]:NEEDS[Kerbalism,SystemHeat,WildBlueIndustries]:LAST[KerbalismBridge20Process]
{
	@MODULE[ProcessControllerSystemHeat]:HAS[#resource[_Nukereactor]]
	{
		@capacity = 12.5
		%MinimumThrottle = 25
		%systemOutletTemperature = 1000
		%systemPower = 500
		!systemEfficiency {}
		systemEfficiency
		{
			key = 0     0.0
			key = 1000  1.0
			key = 1300  0.0
		}
	}

	@MODULE[Reliability]:HAS[#type[ProcessControllerSystemHeat]]
	{
		@mtbf = 170000000
	}
}
