// ============================================================================
// Kerbal Atomics + SystemHeat fission engines
// ============================================================================
// KA engines can carry legacy NFE/stock reactor modules alongside
// ModuleSystemHeatFissionEngine. Kerbalism's fission engine sidecar owns the
// loaded/background resource flow, so remove legacy producers that directly
// write EnrichedUranium/DepletedFuel and trigger high-warp coherency warnings.
@PART[ntr-*]:HAS[@MODULE[ModuleSystemHeatFissionEngine]]:NEEDS[Kerbalism,SystemHeat]:LAST[KerbalismBridge00Integration]
{
	!MODULE[ModuleUpdateOverride],* {}
	!MODULE[FissionReactor],* {}
	!MODULE[FissionGenerator],* {}
	!MODULE[ModuleRadioisotopeGenerator],* {}
	!MODULE[ModuleCoreHeat],* {}
	!MODULE[ModuleCoreHeatNoCatchup],* {}
	!MODULE[RadioactiveStorageContainer],* {}
	!MODULE[ModuleAlternator],* {}
	!MODULE[ModuleGenerator],* {}

	@MODULE[ModuleEngines*],*
	{
		@heatProduction = 0
	}

	@MODULE[ModuleSystemHeatFissionEngine]:HAS[!#moduleID[*]]
	{
		%moduleID = engine
	}
}
