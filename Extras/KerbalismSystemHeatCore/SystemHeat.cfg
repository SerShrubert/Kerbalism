    !MODULE[ModuleSystemHeatAsteroidHarvester],* {}
    !MODULE[ModuleSystemHeatCometHarvester],* {}
    !MODULE[ModuleCometDrill],* {}
    !MODULE[ModuleAsteroidDrill],* {}

    @MODULE[Harvester],*
    {
		// swap to our heat-aware harvester
