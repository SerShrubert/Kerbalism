// ============================================================================
// KerbalismBridge integration: Converters_ProcessControllerSystemHeat.cfg
// ============================================================================
// Chemical Plant -> ProcessControllerSystemHeat (Kerbalism ISRU path only)

// Strip leftover SystemHeat converters on Kerbalism Chemical Plant parts.
@PART[*]:HAS[@MODULE[Configure]:HAS[#configureId[ChemicalPlant]],@MODULE[ModuleSystemHeatConverter]]:NEEDS[Kerbalism,SystemHeat]:LAST[KerbalismBridge10Native]
{
	!MODULE[ModuleSystemHeatConverter],* {}
}


// UniversalStorage2
@PART[USElektron,USSabatier,USWaterPurifier]:NEEDS[Kerbalism,SystemHeat,UniversalStorage2]:LAST[KerbalismBridge20Process]
{
    // Add or update the SystemHeat module
    %MODULE[ModuleSystemHeat]
    {
        %volume = #$/mass$
        %moduleID = isru
        %iconName = Icon_Radiator
        %ignoreTemperature = true
    }

    // Convert the Kerbalism ProcessController
    @MODULE[ProcessController]:HAS[#capacity[*]],*
    {
        // swap to our heat-aware controller
        @name = ProcessControllerSystemHeat

        // wire to this part's SystemHeat loop
        %systemHeatModuleID = isru

        // core SystemHeat params
        %shutdownTemperature = 800
        %systemOutletTemperature = 600

        // set base heat power equal to the Kerbalism process capacity
        %systemPower = #$capacity$

        // default behavior flags; Kerbalism handles resources, we handle heat
        %AutoShutdown = true
        %GeneratesHeat = false

        // define/replace the thermal efficiency curve
        !systemEfficiency {}
        systemEfficiency
        {
            key = 0    0.0
            key = 300  1.0
            key = 1000 1.0
            key = 1300 0.0
        }
    }
}

// UniversalStorage2 Reliability -> remap ProcessController -> ProcessControllerSystemHeat
@PART[USElektron,USSabatier,USWaterPurifier]:HAS[@MODULE[Reliability]:HAS[#type[ProcessController]]]:NEEDS[Kerbalism,SystemHeat,UniversalStorage2,FeatureReliability]:LAST[KerbalismBridge20Process]
{
    @MODULE[Reliability]:HAS[#type[ProcessController]]
