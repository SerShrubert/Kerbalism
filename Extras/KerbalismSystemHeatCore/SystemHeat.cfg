// RR path (strip duplicate Configure)
@PART[KKAOSS_ISRU_g]:HAS[@MODULE[Configure]:HAS[#title[Chemical?Production?Unit]]]:NEEDS[Kerbalism,SystemHeat,RationalResourcesKerbalism,PlanetaryBaseInc]:BEFORE[RationalResourcesKerbalism]
{
    //this kills the reliabilty module as well. But since it is misnamed I am down for it.
    !MODULE[*]:HAS[#title[Chemical?Production?Unit]],* {}
