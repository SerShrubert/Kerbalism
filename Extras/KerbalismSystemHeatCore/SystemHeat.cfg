    !MODULE[*]:HAS[#resource[_WaterElectrolysisH2Priority]],* {}
    @MODULE[Configure],*
    {
        !SETUP:HAS[@MODULE:HAS[#id_value[_WaterElectrolysisH2Priority]]],* {}
    }

    !MODULE[*]:HAS[#resource[_SabatierH2OPriority]],* {}
    @MODULE[Configure],*
    {
        !SETUP:HAS[@MODULE:HAS[#id_value[_SabatierH2OPriority]]],* {}
    }
}

// Nested Reliability fix (AirlineKuisine)
@PART[dsak_proc_3c,dsak_proc_c]:NEEDS[Kerbalism,SystemHeat,AirlineKuisine,FeatureReliability]:LAST[KerbalismBridge20Process]
{
    // Create/update a root-level Reliability using values from the nested one
    %MODULE[Reliability]
    {
        %type        = #$../MODULE[Configure]/MODULE[Reliability]/type$
        %title       = #$../MODULE[Configure]/MODULE[Reliability]/title$
        %repair      = #$../MODULE[Configure]/MODULE[Reliability]/repair$
        %mtbf        = #$../MODULE[Configure]/MODULE[Reliability]/mtbf$
        %extra_cost  = #$../MODULE[Configure]/MODULE[Reliability]/extra_cost$
        %extra_mass  = #$../MODULE[Configure]/MODULE[Reliability]/extra_mass$
    }

    // Remove the nested Reliability from Configure
    @MODULE[Configure]
    {
        !MODULE[Reliability],* {}
    }
}

@PART[*]:HAS[@MODULE[Configure]:HAS[#configureId[ChemicalPlant]]]:NEEDS[Kerbalism,SystemHeat]:LAST[KerbalismBridge20Process]
{
    // Clean out any legacy bridge modules to prevent duplicates
    !MODULE[SystemHeatConverterKerbalism],* {}

    // Clean up any stray Reliability modules with ModuleResourceConverter
    !MODULE[Reliability]:HAS[#type[ModuleResourceConverter]],* {}

    // Convert every ProcessController on the part
    @MODULE[ProcessController]:HAS[#capacity[*]],*
    {
        // swap to our heat-aware controller
        @name = ProcessControllerSystemHeat

        // wire to this part's SystemHeat loop
        %systemHeatModuleID = isru

        // core SystemHeat params
        %shutdownTemperature = 800
        %systemOutletTemperature = 600

        // set base heat power equal to the Kerbalism process capacity
        %systemPower = #$capacity$

        // default behavior flags; Kerbalism handles resources, we handle heat
        %AutoShutdown = true
        %GeneratesHeat = false

        // define/replace the thermal efficiency curve
        !systemEfficiency {}
        systemEfficiency
        {
            key = 0    0.0
            key = 300  1.0
            key = 1000 1.0
            key = 1300 0.0
        }
    }

    @MODULE[Reliability]:HAS[#type[ProcessController]]
    {
        @type = ProcessControllerSystemHeat
    }
}

// Chemical Plant Reliability
@PART[*]:HAS[@MODULE[Configure]:HAS[#configureId[ChemicalPlant]],!MODULE[Reliability]:HAS[#type[ProcessControllerSystemHeat]]]:NEEDS[Kerbalism,SystemHeat,FeatureReliability]:LAST[KerbalismBridge20Process]
{
    MODULE
    {
        name = Reliability
        type = ProcessControllerSystemHeat
        title = #KERBALISM_BranchLoc_Chemical_Plant
        repair = Engineer
        mtbf = 72576000
        extra_cost = 1.0
        extra_mass = 0.2
    }
}

@PART[*]:HAS[@MODULE[Configure]:HAS[#configureId[ChemicalPlant]]]:NEEDS[Kerbalism,SystemHeat]:LAST[KerbalismBridge20Process]
{
    @MODULE[Configure]
    {
        @SETUP,*
        {
            @MODULE,*
            {
                @type = ProcessControllerSystemHeat
            }
        }
    }
}


// ============================================================================
// KerbalismBridge integration: B9PartSwitch_SystemHeatRadiators.cfg
// ============================================================================
// B9PartSwitch -> SystemHeatRadiatorKerbalism identifiers
@PART[*]:HAS[@MODULE[SystemHeatRadiatorKerbalism],@MODULE[ModuleB9PartSwitch]]:NEEDS[Kerbalism,SystemHeat,B9PartSwitch,KerbalismRadiatorRenameLegacy]:LAST[KerbalismBridge20Process]
{
	@MODULE[ModuleB9PartSwitch],*
	{
		@SUBTYPE,*
		{
			@MODULE,*
			{
				@IDENTIFIER[ModuleSystemHeatRadiator]
				{
					@name = SystemHeatRadiatorKerbalism
				}
				@IDENTIFIER[ModuleActiveRadiator]
				{
					@name = SystemHeatRadiatorKerbalism
				}
			}
		}
	}
}


// ============================================================================
// KerbalismBridge integration: LegacyModuleMigration.cfg
// ============================================================================
// Legacy KerbalismSystemHeat 0.5.0 module names -> current fork (cleanup stage)

// Bridge classes
@PART[*]:HAS[@MODULE[SystemHeatConverterKerbalism]]:NEEDS[Kerbalism,SystemHeat]:LAST[KerbalismBridge90Cleanup]
{
	@MODULE[SystemHeatConverterKerbalism],*
	{
		@name = ProcessControllerSystemHeat
	}
}

@PART[*]:HAS[@MODULE[SystemHeatHarvesterKerbalism]]:NEEDS[Kerbalism,SystemHeat]:LAST[KerbalismBridge90Cleanup]
{
	@MODULE[SystemHeatHarvesterKerbalism],*
	{
		@name = HarvesterSystemHeat
	}
}

// Legacy harvester without heat loop
@PART[*]:HAS[@MODULE[SystemHeatHarvesterKerbalism],!MODULE[ModuleSystemHeat]]:NEEDS[Kerbalism,SystemHeat]:AFTER[Kerbalism]
{
	MODULE
	{
		name = ModuleSystemHeat
		volume = #$/mass$
		moduleID = harvester
		iconName = Icon_Drill
	}
}

// B9PartSwitch legacy SystemHeat IDENTIFIER renames

@PART[*]:HAS[@MODULE[ModuleB9PartSwitch]]:NEEDS[Kerbalism,SystemHeat,B9PartSwitch]:LAST[KerbalismBridge90Cleanup]
{
	@MODULE[ModuleB9PartSwitch],*
	{
		@SUBTYPE,*
		{
			@MODULE,*
			{
				@IDENTIFIER:HAS[#name[SystemHeatConverterKerbalism]]
				{
					@name = ProcessControllerSystemHeat
				}

				@IDENTIFIER:HAS[#name[SystemHeatHarvesterKerbalism]]
				{
					@name = HarvesterSystemHeat
				}
			}
		}
	}
}
