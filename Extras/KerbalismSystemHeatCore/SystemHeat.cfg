// ============================================================================
// SystemHeat.cfg
// Optional KerbalismSystemHeatCore Extra (standalone GameData folder).
// ============================================================================

// Distributed integration patches run in ordered ModuleManager :LAST stages,
// leaving :FINAL available for end-user overrides:
// 00Integration -> 10Native -> 20Process -> 30Radiation -> 90Cleanup.


// ============================================================================
// SystemHeat integration settings
// ============================================================================
KERBALISM_BRIDGE_SETTINGS
{
	// Simulate SystemHeat loop temperatures for unloaded vessels
	BackgroundThermalSim = true
	// Scales simplified radiator rejection in background thermal sim
	BackgroundRadiatorCoefficient = 0.05
}


// ============================================================================
// Fission reactors (KerbalismSystemHeatCore exclusive path)
// ============================================================================
// Some third-party SystemHeat patches omit moduleID. Kerbalism sidecars need a
// stable ID so Harmony can fully take over loaded and background resource flow.
@PART[*]:HAS[@MODULE[ModuleSystemHeatFissionReactor]:HAS[!#moduleID[*]]]:NEEDS[Kerbalism,SystemHeat]:LAST[KerbalismBridge00Integration]
{
	@MODULE[ModuleSystemHeatFissionReactor]:HAS[!#moduleID[*]]
	{
		%moduleID = reactor
	}
}

// Legacy scalar HeatGeneration -> FloatCurve (old SystemHeat patches)
@PART[*]:HAS[@MODULE[ModuleSystemHeatFissionReactor]:HAS[#HeatGeneration[*],!HeatGeneration]]:NEEDS[Kerbalism,SystemHeat]:LAST[KerbalismBridge00Integration]
{
	@MODULE[ModuleSystemHeatFissionReactor]:HAS[#HeatGeneration[*],!HeatGeneration]
	{
		%KSH_HeatGeneration = #$HeatGeneration$
	}
}
@PART[*]:HAS[@MODULE[ModuleSystemHeatFissionReactor]:HAS[#KSH_HeatGeneration[*],!HeatGeneration]]:NEEDS[Kerbalism,SystemHeat]:LAST[KerbalismBridge00Integration]
{
	@MODULE[ModuleSystemHeatFissionReactor]:HAS[#KSH_HeatGeneration[*],!HeatGeneration]
	{
		!HeatGeneration = DELETE
		HeatGeneration
		{
			key = 0 0 0 0
			key = #100 $../KSH_HeatGeneration$ 0 0
		}
	}
}
@PART[*]:HAS[@MODULE[ModuleSystemHeatFissionReactor]:HAS[#KSH_HeatGeneration[*]]]:NEEDS[Kerbalism,SystemHeat]:LAST[KerbalismBridge00Integration]
{
	@MODULE[ModuleSystemHeatFissionReactor]:HAS[#KSH_HeatGeneration[*]]
	{
		!KSH_HeatGeneration = DELETE
	}
}

// Fission reactor KerbalismUpdater + planner (exclude NFE and KPBS ProcessControllerSystemHeat paths)
@PART[!nfe-reactor-*,!KKAOSS_Nuclear_Reactor]:HAS[@MODULE[ModuleSystemHeatFissionReactor]:HAS[#moduleID[*]],!MODULE[ProcessControllerSystemHeat]]:NEEDS[Kerbalism,SystemHeat]:LAST[KerbalismBridge10Native]
{
	MODULE
	{
		name = SystemHeatFissionReactorKerbalismUpdater
		reactorModuleID = #$/MODULE[ModuleSystemHeatFissionReactor]:HAS[#moduleID[*]],0/moduleID$
	}

	!MODULE[ProcessController],* {}
	!MODULE[PlannerController],* {}
	MODULE
	{
		name = PlannerController
		plannerId = fissionReactor
		title = #KERBALISM_Brokers_FissionReactor
		considered = true
	}

	@MODULE[Reliability]:HAS[#type[ProcessController]]
	{
		@type = ModuleSystemHeatFissionReactor
	}
}

// Add Reliability to fission reactors
@PART[*]:HAS[@MODULE[ModuleSystemHeatFissionReactor],!MODULE[Reliability]]:NEEDS[FeatureReliability,SystemHeat]:LAST[KerbalismBridge10Native]
{
	MODULE
	{
		name = Reliability
		type = ModuleSystemHeatFissionReactor
		title = #KERBALISM_BranchLoc_Fission_Reactor
		redundancy = Power Generation
		repair = Engineer
		mtbf = 36288000
		extra_cost = 2.5
		extra_mass = 1.0
	}
}


// ============================================================================
// Fission engines (KerbalismSystemHeatCompat exclusive path)
// ============================================================================
// Some third-party SystemHeat patches omit moduleID. Without it, fission engines
// keep their native resource producer and can trip Kerbalism coherency checks.
@PART[*]:HAS[@MODULE[ModuleSystemHeatFissionEngine]:HAS[!#moduleID[*]]]:NEEDS[Kerbalism,SystemHeat,KerbalismSystemHeatCompat]:LAST[KerbalismBridge00Integration]
{
	@MODULE[ModuleSystemHeatFissionEngine]:HAS[!#moduleID[*]]
	{
		%moduleID = engine
	}
}

// Legacy scalar HeatGeneration -> FloatCurve (old SystemHeat patches)
@PART[*]:HAS[@MODULE[ModuleSystemHeatFissionEngine]:HAS[#HeatGeneration[*],!HeatGeneration]]:NEEDS[Kerbalism,SystemHeat,KerbalismSystemHeatCompat]:LAST[KerbalismBridge00Integration]
{
	@MODULE[ModuleSystemHeatFissionEngine]:HAS[#HeatGeneration[*],!HeatGeneration]
	{
		%KSH_HeatGeneration = #$HeatGeneration$
	}
}
@PART[*]:HAS[@MODULE[ModuleSystemHeatFissionEngine]:HAS[#KSH_HeatGeneration[*],!HeatGeneration]]:NEEDS[Kerbalism,SystemHeat,KerbalismSystemHeatCompat]:LAST[KerbalismBridge00Integration]
{
	@MODULE[ModuleSystemHeatFissionEngine]:HAS[#KSH_HeatGeneration[*],!HeatGeneration]
	{
		!HeatGeneration = DELETE
		HeatGeneration
		{
			key = 0 0 0 0
			key = #2 $../KSH_HeatGeneration$ 0 0
			key = #100 $../KSH_HeatGeneration$ 0 0
		}
	}
}
@PART[*]:HAS[@MODULE[ModuleSystemHeatFissionEngine]:HAS[#KSH_HeatGeneration[*]]]:NEEDS[Kerbalism,SystemHeat,KerbalismSystemHeatCompat]:LAST[KerbalismBridge00Integration]
{
	@MODULE[ModuleSystemHeatFissionEngine]:HAS[#KSH_HeatGeneration[*]]
	{
		!KSH_HeatGeneration = DELETE
	}
}

// Fission engine KerbalismUpdater (EC and non-EC paths)
@PART[*]:HAS[@MODULE[ModuleSystemHeatFissionEngine]:HAS[#moduleID[*]],!MODULE[SystemHeatFissionEngineKerbalismUpdater]]:NEEDS[Kerbalism,SystemHeat,KerbalismSystemHeatCompat]:LAST[KerbalismBridge10Native]
{
	MODULE
	{
		name = SystemHeatFissionEngineKerbalismUpdater
		engineModuleID = #$/MODULE[ModuleSystemHeatFissionEngine]:HAS[#moduleID[*]],0/moduleID$
	}

	!MODULE[ProcessController],* {}
}

// Planner on EC-capable fission engines only
@PART[*]:HAS[@MODULE[ModuleSystemHeatFissionEngine]:HAS[#moduleID[*],@ElectricalGeneration,!#GeneratesElectricity[*alse]],@MODULE[SystemHeatFissionEngineKerbalismUpdater]]:NEEDS[Kerbalism,SystemHeat,KerbalismSystemHeatCompat]:LAST[KerbalismBridge10Native]
{
	!MODULE[PlannerController],* {}
	MODULE
	{
		name = PlannerController
		plannerId = fissionEngine
		title = #KERBALISM_Brokers_FissionEngine
		considered = false
	}
}
@PART[*]:HAS[@MODULE[ModuleSystemHeatFissionEngine]:HAS[#moduleID[*],#GeneratesElectricity[*alse]]]:NEEDS[Kerbalism,SystemHeat,KerbalismSystemHeatCompat]:LAST[KerbalismBridge10Native]
{
	@MODULE[SystemHeatFissionEngineKerbalismUpdater]
	{
		%GeneratesElectricity = false
		%MaxECGeneration = 0
	}
	!MODULE[PlannerController]:HAS[#plannerId[fissionEngine]] {}
}


