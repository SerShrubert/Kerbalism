}


// ============================================================================
// KerbalismBridge integration: SystemHeatRadiators.cfg
// ============================================================================
// Universal Storage 2 radiators not converted by SystemHeat itself.
// The microsatellite uses a normal stock radiator and can be converted in-place.
@PART[USAdvancedMicroSatWedge]:HAS[@MODULE[ModuleActiveRadiator]]:NEEDS[Kerbalism,SystemHeat,UniversalStorage2]:LAST[KerbalismBridge20Process]
{
	%MODULE[ModuleSystemHeat]
	{
		%volume = #$/mass$
		%moduleID = default
		%iconName = Icon_Radiator
		%ignoreTemperature = true
	}

	@MODULE[ModuleActiveRadiator]
	{
		@name = ModuleSystemHeatRadiator
		%moduleID = radiator
		%systemHeatModuleID = default
		%maxRadiatorTemperature = 350
		%emissivity = 0.9
		%convectiveArea = 0.5
		!temperatureCurve {}
		temperatureCurve
		{
			key = 0 0
			key = 400 20
		}
	}
}

// USRadiatorSwitch also controls the structural/radiator mesh variant, so it
// must remain on the part. Add a real SystemHeat radiator and synchronize it
// from the switch through SystemHeatRadiatorKerbalism.
@PART[USAdaptorShroud1250Vostok]:HAS[@MODULE[USRadiatorSwitch],!MODULE[ModuleSystemHeatRadiator]]:NEEDS[Kerbalism,SystemHeat,UniversalStorage2]:LAST[KerbalismBridge20Process]
{
	%MODULE[ModuleSystemHeat]
	{
		%volume = #$/mass$
		%moduleID = default
		%iconName = Icon_Radiator
		%ignoreTemperature = true
	}

	MODULE
	{
		name = ModuleSystemHeatRadiator
		moduleID = us2Radiator
		systemHeatModuleID = default
		maxRadiatorTemperature = 350
		emissivity = 0.9
		convectiveArea = 1
		maxEnergyTransfer = 5000
		overcoolFactor = 0.25
		isCoreRadiator = true
		parentCoolingOnly = true
		temperatureCurve
		{
			key = 0 0
			key = 400 100
		}
	}
}

// SystemHeat radiators keep their native module for actual loop rejection.
// Kerbalism sidecar only takes over resource accounting/background/planner handling.
@PART[*]:HAS[@MODULE[ModuleSystemHeatRadiator],!MODULE[USRadiatorSwitch],!MODULE[SystemHeatRadiatorKerbalism]]:NEEDS[Kerbalism,SystemHeat]:LAST[KerbalismBridge20Process]
{
	MODULE
	{
		name = SystemHeatRadiatorKerbalism
		radiatorModuleName = ModuleSystemHeatRadiator
	}
	!MODULE[PlannerController],* {}
	MODULE
	{
		name = PlannerController
		plannerId = radiator
		title = #KERBALISM_Brokers_Radiator
		considered = true
	}
}

// Stock radiators without SystemHeat native sidecar support.
@PART[!heat-exchanger-125-1,!heat-exchanger-25-1]:HAS[@MODULE[ModuleActiveRadiator],!MODULE[ModuleSystemHeatRadiator],!MODULE[SystemHeatRadiatorKerbalism]]:NEEDS[Kerbalism,SystemHeat]:LAST[KerbalismBridge20Process]
{
	MODULE
	{
		name = SystemHeatRadiatorKerbalism
		radiatorModuleName = ModuleActiveRadiator
	}
	!MODULE[PlannerController],* {}
	MODULE
	{
		name = PlannerController
		plannerId = radiator
		title = #KERBALISM_Brokers_Radiator
		considered = true
	}
}

// Universal Storage 2 mesh-switch radiators
@PART[*]:HAS[@MODULE[USRadiatorSwitch],!MODULE[SystemHeatRadiatorKerbalism]]:NEEDS[Kerbalism,SystemHeat,UniversalStorage2]:LAST[KerbalismBridge20Process]
