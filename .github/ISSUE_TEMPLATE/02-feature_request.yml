name: Feature request
description: Suggest an enhancement or change in behavior.
title: "[Feature Request]: "
labels: ["enhancement", "discussion"]
body:
  - type: markdown
    attributes:
      value: |
        Please read [How to Suggest Features](https://github.com/Kerbalism/Kerbalism/blob/master/CONTRIBUTING.md#how-to-suggest-features).

        Maintainers work on this mod for fun and are unpaid. Be respectful, and consider workload and trade-offs.

  - type: textarea
    id: request
    attributes:
      label: Request
      description: What problem does this solve, and what do you propose? Mention any current workaround if you have one.
      placeholder: |
        Problem / motivation: …
        Proposed solution: …
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches, existing tools, or config-only solutions.
      placeholder: Optional, but helpful.

  - type: textarea
    id: impact
    attributes:
      label: Impact and drawbacks
      description: |
        Consider performance, gameplay changes, save compatibility, config complexity, and maintenance cost.
        See CONTRIBUTING.md — “Consider the Impact”.
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I checked CONTRIBUTING.md / existing issues
          required: true
        - label: I am willing to help test (or contribute an implementation if I can)
          required: false
